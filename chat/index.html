<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emersus Chat | Emersus AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/site.css">
  <style>
    :root {
      --chat-shell-padding: 1rem;
      --chat-history-width: 280px;
      --chat-glass: linear-gradient(180deg, rgba(11, 13, 16, 0.92), rgba(9, 11, 14, 0.88));
      --chat-panel: rgba(255, 255, 255, 0.035);
      --chat-panel-strong: rgba(255, 255, 255, 0.055);
      --chat-blur: blur(28px);
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 280, "GRAD" 0, "opsz" 24;
      line-height: 1;
    }

    body.chat-page {
      overflow-x: hidden;
      overflow-y: hidden;
    }

    .chat-app-shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: var(--chat-history-width) minmax(0, 1fr) 330px;
      gap: 1rem;
      height: calc(100vh - 2rem);
      min-height: calc(100vh - 2rem);
      align-items: stretch;
      padding: 1rem;
    }

    .chat-app-shell.history-hidden {
      --chat-history-width: 0px;
    }

    .chat-nav,
    .chat-main,
    .chat-rail {
      position: relative;
      overflow: visible;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top left, rgba(109, 159, 255, 0.06), transparent 30%),
        radial-gradient(circle at top right, rgba(159, 251, 0, 0.05), transparent 28%),
        var(--chat-glass);
      box-shadow: var(--shadow);
      backdrop-filter: var(--chat-blur);
    }

    .chat-nav,
    .chat-rail {
      border-radius: 22px;
    }

    .chat-main {
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .chat-nav::before,
    .chat-main::before,
    .chat-rail::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(109, 159, 255, 0.04), rgba(159, 251, 0, 0));
      pointer-events: none;
    }

    .chat-nav {
      display: flex;
      flex-direction: column;
      padding: 2rem 1.25rem 1.2rem;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      transition: opacity 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .chat-app-shell.history-hidden .chat-nav {
      opacity: 0;
      transform: translateX(-12px);
      pointer-events: none;
      border-color: transparent;
    }

    .chat-brand {
      padding: 0.6rem 0.9rem 1.6rem;
    }

    .chat-brand-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.8rem;
    }

    .chat-nav-actions {
      display: flex;
      justify-content: flex-start;
      padding: 0.9rem 0.15rem 0;
    }

    .chat-brand-mark {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: var(--ink);
      text-transform: uppercase;
    }

    .chat-brand-subtitle {
      margin: 0.4rem 0 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--secondary);
    }

    .chat-nav-list {
      display: grid;
      gap: 0.45rem;
      margin-top: 0.8rem;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      align-content: start;
      padding-right: 0.15rem;
    }

    .chat-nav-list,
    .conversation-canvas,
    .chat-rail {
      scrollbar-width: thin;
      scrollbar-color: rgba(108, 108, 108, 0.95) rgba(18, 18, 18, 0.96);
    }

    .chat-nav-list::-webkit-scrollbar,
    .conversation-canvas::-webkit-scrollbar,
    .chat-rail::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .chat-nav-list::-webkit-scrollbar-track,
    .conversation-canvas::-webkit-scrollbar-track,
    .chat-rail::-webkit-scrollbar-track {
      background: rgba(18, 18, 18, 0.96);
      border-radius: 999px;
    }

    .chat-nav-list::-webkit-scrollbar-thumb,
    .conversation-canvas::-webkit-scrollbar-thumb,
    .chat-rail::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(112, 112, 112, 0.96), rgba(76, 76, 76, 0.96));
      border-radius: 999px;
      border: 2px solid rgba(10, 10, 10, 0.96);
    }

    .chat-nav-list::-webkit-scrollbar-thumb:hover,
    .conversation-canvas::-webkit-scrollbar-thumb:hover,
    .chat-rail::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(138, 138, 138, 0.98), rgba(96, 96, 96, 0.98));
    }

    .chat-nav-link {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.95rem 1rem;
      width: 100%;
      border: 0;
      border-radius: 4px;
      background: transparent;
      text-align: left;
      color: var(--muted);
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .chat-nav-link:hover,
    .chat-nav-link:focus-visible {
      transform: translateX(2px);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.04);
    }

    .chat-nav-link.is-active {
      color: var(--secondary);
      background: rgba(159, 251, 0, 0.08);
      box-shadow: inset 0 0 0 1px rgba(159, 251, 0, 0.08);
    }

    .chat-nav-label {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.86rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .chat-nav-meta {
      display: block;
      margin-top: 0.2rem;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0;
      text-transform: none;
      font-family: "Inter", sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-nav-foot-copy {
      margin: 0;
      color: rgba(255, 255, 255, 0.76);
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .chat-main-body {
      position: relative;
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .conversation-canvas {
      display: flex;
      flex: 1;
      min-height: 0;
      padding: 0.65rem 1.4rem 0.8rem;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      justify-content: center;
    }

    .chat-thread {
      display: grid;
      gap: 0.28rem;
      align-content: start;
      min-height: min-content;
      width: 100%;
      max-width: 760px;
      overflow: visible;
      padding-right: 0;
    }

    .chat-thread.is-empty {
      min-height: 100%;
      align-content: center;
    }

    .thread-welcome {
      display: grid;
      gap: 0.9rem;
      max-width: 46rem;
      padding: 0 0.2rem;
    }

    .thread-welcome-eyebrow {
      margin: 0;
      color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .thread-welcome-title {
      margin: 0;
      color: var(--ink);
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2.75rem, 7vw, 4.8rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 0.96;
    }

    .thread-welcome-copy {
      margin: 0;
      max-width: 33rem;
      color: rgba(255, 255, 255, 0.72);
      font-size: 1rem;
      line-height: 1.7;
    }

    .message {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      padding: 0;
      border-radius: 0;
      line-height: 1.68;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      overflow: visible;
    }

    .message::before {
      display: none;
    }

    .message.user {
      text-align: right;
    }

    .message.assistant {
      text-align: left;
    }

    .message-meta {
      display: none;
    }

    .message-content {
      display: grid;
      gap: 0.12rem;
      font-size: 1rem;
    }

    .message.user .message-content {
      justify-items: end;
      margin-left: auto;
      font-style: italic;
      color: rgba(255, 255, 255, 0.88);
    }

    .message.assistant.is-revealing .message-content {
      opacity: 0.98;
    }

    .message.assistant.is-revealing ul,
    .message.assistant.is-revealing ol {
      list-style: none;
    }

    .assistant-report {
      display: grid;
      gap: 0.12rem;
    }

    .narrative-section ul,
    .watchout-list {
      margin: 0;
      padding-left: 1rem;
      display: grid;
      gap: 0.18rem;
    }

    .narrative-section li,
    .watchout-list li {
      color: rgba(255, 255, 255, 0.88);
    }

    .watchout-list {
      list-style: disc;
    }

    .narrative-stack {
      display: grid;
      gap: 0.22rem;
    }

    .narrative-section {
      display: grid;
      gap: 0.1rem;
      border-top: 0;
      padding-top: 0;
    }

    .narrative-section > p {
      margin: 0;
    }

    .narrative-section > p + p {
      margin-top: 0.14rem;
    }

    .narrative-section > ul {
      margin-top: 0.04rem;
    }

    .narrative-heading {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .chat-composer-shell {
      padding: 0 1.4rem 1.2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      background: linear-gradient(180deg, rgba(12, 14, 18, 0), rgba(12, 14, 18, 0.58));
      flex-shrink: 0;
    }

    .composer {
      display: grid;
      gap: 0.85rem;
      margin-top: 1rem;
      margin-left: auto;
      margin-right: auto;
      width: min(100%, 720px);
      padding: 0.85rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top left, rgba(109, 159, 255, 0.06), transparent 24%),
        rgba(255, 255, 255, 0.035);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
    }

    .composer-row {
      display: flex;
      align-items: flex-end;
      gap: 0.85rem;
    }

    .composer textarea {
      min-height: 4rem;
      max-height: 9rem;
      flex: 1;
      resize: none;
      border: 0;
      background: transparent;
      color: var(--ink);
      line-height: 1.6;
      padding: 0.35rem 0.25rem 0.35rem 0;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .composer textarea:focus {
      outline: none;
    }

    .composer textarea::-webkit-scrollbar {
      display: none;
    }

    .composer textarea::placeholder {
      color: #6d7480;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding-right: 0.3rem;
    }

    .submit-orb {
      width: 3rem;
      height: 3rem;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--secondary), var(--primary-dim));
      color: #040806;
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px rgba(159, 251, 0, 0.25);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .submit-orb:hover,
    .submit-orb:focus-visible {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 0 30px rgba(159, 251, 0, 0.3);
    }

    .composer-utility-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      padding: 0 0.45rem 0.2rem;
    }

    .composer-buttons {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
    }

    .inline-button {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--ink);
      border-radius: 10px;
      padding: 0.55rem 0.9rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .inline-button:hover,
    .inline-button:focus-visible {
      background: rgba(255, 255, 255, 0.08);
    }

    .inline-button[data-history-toggle] {
      min-width: 2.5rem;
      justify-content: center;
      padding-inline: 0.72rem;
    }

    .status-text {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
      text-align: right;
    }

    .chat-rail {
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 1rem;
      min-height: 0;
      height: 100%;
      padding: 1rem;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .rail-card {
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background:
        radial-gradient(circle at top left, rgba(109, 159, 255, 0.06), transparent 28%),
        rgba(255, 255, 255, 0.03);
      padding: 1.2rem 1.15rem;
    }

    .rail-title {
      margin: 0 0 1rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--primary-dim);
    }

    .rail-metric-stack {
      display: grid;
      gap: 1rem;
    }

    .rail-metric {
      display: grid;
      gap: 0.4rem;
    }

    .rail-metric-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 0.75rem;
    }

    .rail-metric-label {
      margin: 0;
      color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .rail-metric-value {
      margin: 0;
      font-size: 2rem;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .rail-metric-note {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--secondary);
    }

    .rail-spark {
      height: 0.65rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
      position: relative;
    }

    .rail-spark::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--spark-width, 50%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary-dim), var(--secondary));
    }

    .rail-spark.tone-medium::before {
      background: linear-gradient(90deg, rgba(240, 179, 74, 0.95), rgba(202, 129, 27, 0.95));
    }

    .rail-spark.tone-caution::before {
      background: linear-gradient(90deg, rgba(255, 143, 157, 0.95), rgba(188, 74, 91, 0.95));
    }

    .source-list {
      display: grid;
      gap: 0.75rem;
      margin: 0;
      padding: 0;
      list-style: none;
      min-height: auto;
      overflow: visible;
      padding-right: 0;
    }

    .source-item {
      padding: 0.95rem 1rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .source-item strong {
      display: block;
      margin-bottom: 0.35rem;
      color: var(--secondary);
      font-size: 0.98rem;
      line-height: 1.35;
    }

    .source-meta {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.5;
      margin-bottom: 0.55rem;
    }

    .source-snippet {
      color: rgba(255, 255, 255, 0.84);
      font-size: 0.92rem;
      line-height: 1.55;
      margin-bottom: 0.65rem;
    }

    .source-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      font-size: 0.84rem;
    }

    .source-links a {
      color: var(--primary-dim);
    }

    .rail-foot {
      margin-top: auto;
      display: grid;
      gap: 0.55rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .rail-foot-line {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1280px) {
      body.chat-page {
        overflow: auto;
      }

      .chat-app-shell {
        grid-template-columns: 250px minmax(0, 1fr);
      }

      .chat-rail {
        grid-column: 1 / -1;
        min-height: auto;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: none;
      }

      .rail-card:last-of-type {
        min-height: 300px;
      }

      .rail-foot {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 980px) {
      .chat-app-shell {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
        padding: 0.8rem;
      }

      .chat-nav,
      .chat-main,
      .chat-rail {
        min-height: auto;
      }

      .chat-nav {
        padding: 1.3rem 1rem 1rem;
      }

      .chat-nav-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .chat-rail {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .conversation-canvas,
      .chat-composer-shell {
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .message {
        max-width: 100%;
      }

      .composer {
        border-radius: 18px;
      }

      .composer-row {
        flex-direction: column;
        align-items: stretch;
      }

      .composer-actions,
      .composer-utility-row {
        justify-content: space-between;
      }

      .score-row {
        grid-template-columns: 1fr;
      }

      .score-value {
        text-align: left;
      }

      .chat-nav-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="chat-page">
  <div class="chat-app-shell">
    <aside class="chat-nav">
      <div class="chat-brand">
        <div class="chat-brand-head">
          <div>
            <h1 class="chat-brand-mark">EMERSUS</h1>
            <p class="chat-brand-subtitle">Evidence Layer Active</p>
          </div>
          <button class="inline-button" type="button" data-history-toggle aria-expanded="true" aria-label="Toggle conversation history">
            <span class="material-symbols-outlined">left_panel_open</span>
          </button>
        </div>
      </div>

      <div class="chat-nav-list" data-chat-history aria-label="Chat history"></div>

      <div class="chat-nav-actions">
        <button class="inline-button" type="button" data-chat-new>
          <span class="material-symbols-outlined">add</span>
          <span>New chat</span>
        </button>
      </div>
    </aside>

    <main class="chat-main">
      <div class="chat-main-body">
        <section class="conversation-canvas">
          <div class="chat-thread" data-chat-thread></div>
        </section>
      </div>

      <div class="chat-composer-shell">
        <form class="composer" data-chat-form>
          <div class="composer-row">
            <label class="sr-only" for="chat-question">Question</label>
            <textarea id="chat-question" name="question" placeholder="Ask me anything about training, nutrition, recovery, or performance."></textarea>

            <div class="composer-actions">
              <button class="submit-orb" type="submit" data-chat-submit aria-label="Send question">
                <span class="material-symbols-outlined">arrow_upward</span>
              </button>
            </div>
          </div>

          <div class="composer-utility-row">
            <div class="composer-buttons"></div>
            <p class="status-text" data-chat-status></p>
          </div>
        </form>
      </div>
    </main>

    <aside class="chat-rail">
      <section class="rail-card">
        <h3 class="rail-title">System status</h3>
        <div class="rail-metric-stack">
          <div class="rail-metric">
            <div class="rail-metric-head">
              <div>
                <p class="rail-metric-label">Confidence</p>
                <p class="rail-metric-value" data-rail-confidence>0.00</p>
              </div>
              <span class="rail-metric-note" data-rail-confidence-label>Idle</span>
            </div>
            <div class="rail-spark" data-rail-confidence-bar style="--spark-width:0%"></div>
          </div>

          <div class="rail-metric">
            <div class="rail-metric-head">
              <div>
                <p class="rail-metric-label">Source count</p>
                <p class="rail-metric-value" data-rail-sources>0</p>
              </div>
              <span class="rail-metric-note">Attached</span>
            </div>
            <div class="rail-spark tone-medium" data-rail-sources-bar style="--spark-width:0%"></div>
          </div>

          <div class="rail-metric">
            <div class="rail-metric-head">
              <div>
                <p class="rail-metric-label">Model state</p>
                <p class="rail-metric-value" data-rail-mode>Ready</p>
              </div>
              <span class="rail-metric-note">Live</span>
            </div>
            <div class="rail-spark tone-caution" data-rail-mode-bar style="--spark-width:68%"></div>
          </div>
        </div>
      </section>

      <section class="rail-card">
        <h3 class="rail-title">Retrieved sources</h3>
        <ul class="source-list" data-chat-sources></ul>
      </section>

      <div class="rail-foot">
        <div class="rail-foot-line"><span>Pipeline</span><span>PubMed + PMC</span></div>
        <div class="rail-foot-line"><span>Interface</span><span>Emersus Chat</span></div>
      </div>
    </aside>
  </div>

  <script type="module">
    import {
      listChatThreads,
      requireAuth,
      setStatus,
      upsertChatThread,
    } from "/shared/supabase.js";

    const form = document.querySelector("[data-chat-form]");
    const questionInput = document.getElementById("chat-question");
    const thread = document.querySelector("[data-chat-thread]");
    const status = document.querySelector("[data-chat-status]");
    const sources = document.querySelector("[data-chat-sources]");
    const submitButton = document.querySelector("[data-chat-submit]");
    const historyToggleButton = document.querySelector("[data-history-toggle]");
    const newChatButton = document.querySelector("[data-chat-new]");
    const historyList = document.querySelector("[data-chat-history]");
    const appShell = document.querySelector(".chat-app-shell");
    const conversationCanvas = document.querySelector(".conversation-canvas");
    const railConfidence = document.querySelector("[data-rail-confidence]");
    const railConfidenceLabel = document.querySelector("[data-rail-confidence-label]");
    const railConfidenceBar = document.querySelector("[data-rail-confidence-bar]");
    const railSources = document.querySelector("[data-rail-sources]");
    const railSourcesBar = document.querySelector("[data-rail-sources-bar]");
    const railMode = document.querySelector("[data-rail-mode]");
    const railModeBar = document.querySelector("[data-rail-mode-bar]");
    const MAX_HISTORY_ITEMS = 24;
    let chatHistory = [];
    let activeThreadId = "";
    let session = null;

    function scrollThreadToBottom() {
      conversationCanvas.scrollTo({
        top: conversationCanvas.scrollHeight,
        behavior: "smooth",
      });
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function animateHtmlInto(container, html) {
      const template = document.createElement("template");
      template.innerHTML = String(html || "").trim();
      const fragment = template.content.cloneNode(true);
      const walker = document.createTreeWalker(fragment, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          return node.textContent.trim() ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
        },
      });

      const textNodes = [];
      let currentNode = walker.nextNode();
      while (currentNode) {
        textNodes.push(currentNode);
        currentNode = walker.nextNode();
      }

      const tokensByNode = textNodes.map((node) => node.textContent.match(/\S+\s*/g) || [node.textContent]);
      textNodes.forEach((node) => {
        node.textContent = "";
      });

      container.appendChild(fragment);
      scrollThreadToBottom();

      for (let nodeIndex = 0; nodeIndex < textNodes.length; nodeIndex += 1) {
        const node = textNodes[nodeIndex];
        const tokens = tokensByNode[nodeIndex];

        for (let tokenIndex = 0; tokenIndex < tokens.length; tokenIndex += 1) {
          node.textContent += tokens[tokenIndex];
          if (tokenIndex % 3 === 0) {
            scrollThreadToBottom();
            await wait(14);
          }
        }

        scrollThreadToBottom();
        await wait(18);
      }
    }

    async function appendMessage(role, content, stamp, options = {}) {
      clearWelcomeState();
      const article = document.createElement("article");
      article.className = `message ${role}`;
      article.innerHTML = `
        <div class="message-content"></div>
      `;
      const body = article.querySelector(".message-content");
      thread.appendChild(article);

      if (options.animate && role === "assistant") {
        article.classList.add("is-revealing");
        await animateHtmlInto(body, content);
        article.classList.remove("is-revealing");
      } else {
        body.innerHTML = content;
        scrollThreadToBottom();
      }

      if (options.persist !== false) {
        const threadData = ensureActiveThread();
        threadData.messages.push({
          role,
          html: String(content || ""),
          plainText: String(options.plainText || ""),
          text: String(options.text || ""),
          createdAt: new Date().toISOString(),
        });
        await persistActiveThread();
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function trimSnippet(value, maxLength = 320) {
      const text = String(value || "").replace(/\s+/g, " ").trim();
      if (!text) {
        return "";
      }

      return text.length > maxLength ? `${text.slice(0, maxLength - 1).trim()}...` : text;
    }

    function createThreadId() {
      if (window.crypto?.randomUUID) {
        return window.crypto.randomUUID();
      }

      return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (char) => {
        const random = Math.floor(Math.random() * 16);
        const value = char === "x" ? random : (random & 0x3) | 0x8;
        return value.toString(16);
      });
    }

    function getDisplayName() {
      const profileName =
        session?.user?.user_metadata?.display_name ||
        session?.user?.user_metadata?.full_name ||
        session?.user?.user_metadata?.name ||
        session?.user?.email?.split("@")[0] ||
        "there";

      return String(profileName || "there").trim();
    }

    function normalizeCompactText(value, maxLength = 240) {
      return String(value || "").replace(/\s+/g, " ").trim().slice(0, maxLength);
    }

    function normalizeCompactList(values, maxItems = 6, maxLength = 80) {
      if (!Array.isArray(values)) {
        return [];
      }

      return values
        .map((value) => normalizeCompactText(value, maxLength))
        .filter(Boolean)
        .filter((value, index, array) => array.indexOf(value) === index)
        .slice(0, maxItems);
    }

    function createEmptyThreadState() {
      return {
        version: 1,
        primary_topic: "",
        secondary_topics: [],
        goal_context: "",
        question_mode: "",
        recent_entities: [],
        comparison_target: "",
        population_context: [],
        constraints: {
          dietary: [],
          injury: [],
          equipment: [],
          schedule: [],
          sleep_stress: [],
          medical_caution: [],
        },
        last_user_intent: "",
        last_answer_summary: "",
        thread_summary: "",
        updated_at: "",
      };
    }

    function mergeThreadState(rawState) {
      const base = createEmptyThreadState();
      const incoming = rawState && typeof rawState === "object" ? rawState : {};

      return {
        ...base,
        ...incoming,
        secondary_topics: normalizeCompactList(incoming.secondary_topics, 4),
        recent_entities: normalizeCompactList(incoming.recent_entities, 8),
        population_context: normalizeCompactList(incoming.population_context, 4),
        constraints: {
          ...base.constraints,
          ...(incoming.constraints && typeof incoming.constraints === "object" ? incoming.constraints : {}),
          dietary: normalizeCompactList(incoming?.constraints?.dietary, 4),
          injury: normalizeCompactList(incoming?.constraints?.injury, 4),
          equipment: normalizeCompactList(incoming?.constraints?.equipment, 4),
          schedule: normalizeCompactList(incoming?.constraints?.schedule, 4),
          sleep_stress: normalizeCompactList(incoming?.constraints?.sleep_stress, 4),
          medical_caution: normalizeCompactList(incoming?.constraints?.medical_caution, 4),
        },
      };
    }

    function questionLooksLikeFollowUp(question) {
      return /^(what about|how about|and for|compare that|compare it|does that|would that|what if|and if|for women|for men|for older adults|for beginners|for me)\b/i.test(
        String(question || "").trim()
      );
    }

    function inferPrimaryTopic(question, previousTopic = "") {
      const text = String(question || "").toLowerCase();

      if (!text) {
        return previousTopic || "";
      }

      const topicMatchers = [
        [/creatine/, "creatine"],
        [/\bvo2\b|\bvo2 max\b|maximal oxygen uptake|cardiorespiratory fitness/, "vo2 max"],
        [/resting heart rate|rhr/, "resting heart rate"],
        [/ashwagandha/, "ashwagandha"],
        [/tongkat ali|eurycoma|eurycome/, "tongkat ali"],
        [/turkesterone/, "turkesterone"],
        [/testosterone/, "testosterone"],
        [/caffeine/, "caffeine"],
        [/protein|amino acid|bcaa|eaa|whey|casein/, "protein"],
        [/sleep|circadian/, "sleep"],
        [/beta[-\s]?alanine/, "beta-alanine"],
        [/citrulline/, "citrulline"],
        [/zone 2|endurance|running|cardio|interval|hiit/, "endurance"],
        [/hypertrophy|muscle gain|build muscle/, "hypertrophy"],
        [/fat loss|cutting|weight loss|caloric deficit/, "fat loss"],
      ];

      for (const [pattern, topic] of topicMatchers) {
        if (pattern.test(text)) {
          return topic;
        }
      }

      if (questionLooksLikeFollowUp(question) && previousTopic) {
        return previousTopic;
      }

      return previousTopic || "";
    }

    function inferGoalContext(question, previousGoal = "") {
      const text = String(question || "").toLowerCase();

      if (/hypertrophy|muscle gain|build muscle|lean mass/.test(text)) {
        return "hypertrophy";
      }
      if (/fat loss|cutting|lose fat|weight loss|deficit/.test(text)) {
        return "fat_loss";
      }
      if (/vo2|endurance|running|cardio|zone 2|aerobic/.test(text)) {
        return "endurance";
      }
      if (/recovery|soreness|sleep|stress/.test(text)) {
        return "recovery";
      }

      return previousGoal || "";
    }

    function inferQuestionMode(question) {
      const text = String(question || "").toLowerCase();

      if (/\bcompare\b|\bversus\b|\bvs\b/.test(text)) {
        return "comparison";
      }
      if (/what should i do|how should i|plan|schedule|dose|dosage|program/.test(text)) {
        return "action_plan";
      }
      if (/for women|for men|for me|if i'm|if i am|what about/.test(text)) {
        return "personalization";
      }
      if (/safe|safety|risk|harm|side effect|contraindication/.test(text)) {
        return "safety";
      }

      return "evidence";
    }

    function extractComparisonTarget(question) {
      const text = String(question || "");
      const match =
        text.match(/\b(?:compare|versus|vs\.?)\s+([a-z0-9][a-z0-9\s-]{1,50})/i) ||
        text.match(/\bhow does .* compare to\s+([a-z0-9][a-z0-9\s-]{1,50})/i);
      return normalizeCompactText(match?.[1] || "", 60).replace(/[?.!,;:]+$/, "");
    }

    function extractPopulationContext(question) {
      const text = String(question || "").toLowerCase();
      const populations = [];

      if (/\bwomen\b|\bfemale\b/.test(text)) populations.push("women");
      if (/\bmen\b|\bmale\b/.test(text)) populations.push("men");
      if (/older adults|elderly|aging/.test(text)) populations.push("older adults");
      if (/beginner|novice/.test(text)) populations.push("beginners");
      if (/athlete|trained|resistance-trained/.test(text)) populations.push("trained adults");

      return normalizeCompactList(populations, 3, 50);
    }

    function extractRecentEntities(question, topic, comparisonTarget) {
      const text = String(question || "").toLowerCase();
      const entities = [];

      if (topic) entities.push(topic);
      if (comparisonTarget) entities.push(comparisonTarget);
      if (/muscle|hypertrophy|lean mass/.test(text)) entities.push("muscle gain");
      if (/strength/.test(text)) entities.push("strength");
      if (/recovery|soreness/.test(text)) entities.push("recovery");
      if (/sleep/.test(text)) entities.push("sleep");
      if (/women|female/.test(text)) entities.push("women");
      if (/cutting|fat loss|deficit/.test(text)) entities.push("fat loss");
      if (/vo2|cardio|endurance|aerobic/.test(text)) entities.push("endurance");

      return normalizeCompactList(entities, 8, 60);
    }

    function buildLastUserIntent(question, mode, topic) {
      const prompt = normalizeCompactText(question, 150);
      if (!prompt) {
        return "";
      }

      if (mode === "comparison") {
        return `asking for a comparison related to ${topic || "the current topic"}`;
      }
      if (mode === "personalization") {
        return `asking how ${topic || "the current topic"} applies in a specific context`;
      }
      if (mode === "action_plan") {
        return `asking what to do next about ${topic || "the current topic"}`;
      }

      return `asking about ${prompt}`;
    }

    function buildThreadSummary(state) {
      const parts = [];

      if (state.primary_topic) {
        parts.push(`This thread is about ${state.primary_topic}`);
      }
      if (state.goal_context) {
        parts.push(`with a ${state.goal_context.replace(/_/g, " ")} goal`);
      }
      if (state.population_context.length) {
        parts.push(`focused on ${state.population_context.join(", ")}`);
      }
      if (state.comparison_target) {
        parts.push(`and comparison against ${state.comparison_target}`);
      }

      const summary = parts.join(" ");
      return summary ? `${summary}.` : "";
    }

    function deriveThreadState(threadData, question = "", answerSummary = "") {
      const previous = mergeThreadState(threadData?.threadState);
      const primaryTopic = inferPrimaryTopic(question, previous.primary_topic);
      const comparisonTarget = extractComparisonTarget(question) || "";
      const populationContext = extractPopulationContext(question);
      const questionMode = inferQuestionMode(question);
      const nextState = mergeThreadState({
        ...previous,
        primary_topic: primaryTopic,
        secondary_topics: normalizeCompactList(
          [
            ...previous.secondary_topics,
            previous.goal_context ? previous.goal_context.replace(/_/g, " ") : "",
            comparisonTarget,
            ...populationContext,
          ],
          4,
          60
        ),
        goal_context: inferGoalContext(question, previous.goal_context),
        question_mode: questionMode,
        recent_entities: extractRecentEntities(question, primaryTopic, comparisonTarget),
        comparison_target:
          questionMode === "comparison" ? comparisonTarget || previous.comparison_target : "",
        population_context:
          populationContext.length > 0 ? populationContext : previous.population_context,
        last_user_intent: buildLastUserIntent(question, questionMode, primaryTopic),
        last_answer_summary:
          normalizeCompactText(answerSummary, 220) || previous.last_answer_summary,
        updated_at: new Date().toISOString(),
      });

      nextState.thread_summary = buildThreadSummary(nextState);
      return nextState;
    }

    function buildRecentMessages(messages, maxItems = 6) {
      return (Array.isArray(messages) ? messages : [])
        .slice(-maxItems)
        .map((message) => ({
          role: normalizeCompactText(message?.role, 24),
          text: normalizeCompactText(message?.plainText || message?.text || "", 320),
        }))
        .filter((message) => message.role && message.text);
    }

    function renderWelcomeState() {
      thread.classList.add("is-empty");
      thread.innerHTML = `
        <section class="thread-welcome">
          <p class="thread-welcome-eyebrow">Emersus</p>
          <h2 class="thread-welcome-title">Welcome, ${escapeHtml(getDisplayName())}</h2>
          <p class="thread-welcome-copy">Ask about training, nutrition, supplements, recovery, cardiovascular fitness, or metabolic health and I&apos;ll keep the answer evidence-aware.</p>
        </section>
      `;
    }

    function clearWelcomeState() {
      thread.classList.remove("is-empty");
      if (thread.querySelector(".thread-welcome")) {
        thread.innerHTML = "";
      }
    }

    function updateHistoryToggleButton() {
      if (!historyToggleButton) {
        return;
      }

      const hidden = appShell.classList.contains("history-hidden");
      historyToggleButton.setAttribute("aria-expanded", String(!hidden));
      historyToggleButton.setAttribute("aria-label", hidden ? "Show conversation history" : "Hide conversation history");
      historyToggleButton.querySelector(".material-symbols-outlined").textContent = hidden ? "left_panel_open" : "left_panel_close";
    }

    function formatHistoryTime(isoString) {
      if (!isoString) {
        return "";
      }

      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) {
        return "";
      }

      return date.toLocaleDateString(undefined, {
        month: "short",
        day: "numeric",
      });
    }

    function deriveThreadTitle(threadData) {
      const firstUserMessage = (threadData?.messages || []).find((message) => message.role === "user");
      const source = String(firstUserMessage?.text || "").replace(/\s+/g, " ").trim();
      if (!source) {
        return "New chat";
      }

      return source.length > 42 ? `${source.slice(0, 41).trim()}...` : source;
    }

    function deriveThreadPreview(threadData) {
      const latestAssistant = [...(threadData?.messages || [])].reverse().find((message) => message.role === "assistant");
      const fallback = (threadData?.messages || []).find((message) => message.role === "user");
      const source = String(latestAssistant?.plainText || latestAssistant?.text || fallback?.text || "").replace(/\s+/g, " ").trim();
      if (!source) {
        return "No messages yet";
      }

      return source.length > 52 ? `${source.slice(0, 51).trim()}...` : source;
    }

    async function loadHistoryFromSupabase() {
      if (!session?.user?.id) {
        return [];
      }

      const rows = await listChatThreads(session.user.id);
      return rows.map((row) => ({
        id: row.id,
        title: row.title || "New chat",
        preview: row.preview || "No messages yet",
        createdAt: row.created_at,
        updatedAt: row.updated_at,
        messages: Array.isArray(row.messages) ? row.messages : [],
        sources: Array.isArray(row.sources) ? row.sources : [],
        rail: row.rail && typeof row.rail === "object" ? row.rail : {},
        threadState: mergeThreadState(row.thread_state),
      }));
    }

    function getActiveThread() {
      return chatHistory.find((threadData) => threadData.id === activeThreadId) || null;
    }

    function ensureActiveThread() {
      let threadData = getActiveThread();
      if (threadData) {
        return threadData;
      }

      threadData = {
        id: createThreadId(),
        title: "New chat",
        preview: "No messages yet",
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        messages: [],
        sources: [],
        rail: {},
        threadState: createEmptyThreadState(),
      };

      activeThreadId = threadData.id;
      chatHistory.unshift(threadData);
      return threadData;
    }

    async function persistActiveThread() {
      const threadData = getActiveThread();
      if (!threadData) {
        return;
      }

      threadData.title = deriveThreadTitle(threadData);
      threadData.preview = deriveThreadPreview(threadData);
      threadData.updatedAt = new Date().toISOString();
      chatHistory = chatHistory
        .filter((item) => item.id !== threadData.id)
        .sort((left, right) => new Date(right.updatedAt || 0) - new Date(left.updatedAt || 0));
      chatHistory.unshift(threadData);
      chatHistory = chatHistory.slice(0, MAX_HISTORY_ITEMS);
      if (session?.user?.id) {
        const saved = await upsertChatThread(session.user.id, threadData);
        threadData.createdAt = saved.created_at;
        threadData.updatedAt = saved.updated_at;
        threadData.threadState = mergeThreadState(saved.thread_state);
      }
      renderHistory();
    }

    function renderHistory() {
      historyList.innerHTML = "";

      if (!chatHistory.length) {
        return;
      }

      chatHistory
        .sort((left, right) => new Date(right.updatedAt || 0) - new Date(left.updatedAt || 0))
        .forEach((threadData) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `chat-nav-link${threadData.id === activeThreadId ? " is-active" : ""}`;
          button.dataset.threadId = threadData.id;
          button.innerHTML = `
            <span class="material-symbols-outlined">history</span>
            <span>
              <span class="chat-nav-label">${escapeHtml(threadData.title || "New chat")}</span>
              <span class="chat-nav-meta">${escapeHtml(`${formatHistoryTime(threadData.updatedAt)} · ${threadData.preview || "No messages yet"}`)}</span>
            </span>
          `;
          historyList.appendChild(button);
        });
    }

    function renderAnswerText(text, fallbackBullets = []) {
      const source = String(text || "").trim();
      if (!source) {
        const fallback = String(fallbackBullets[0] || "No answer returned.").trim();
        return `<div class="narrative-stack"><section class="narrative-section"><p>${escapeHtml(fallback)}</p></section></div>`;
      }

      const blocks = source
        .split(/\r?\n\s*\r?\n/)
        .map((block) => block.trim())
        .filter(Boolean)
        .map((block) => {
          const lines = block
            .split(/\r?\n/)
            .map((line) => line.trim())
            .filter(Boolean);

          const bulletLines = lines.filter((line) => /^[-*•]\s+/.test(line));
          const proseLines = lines.filter((line) => !/^[-*•]\s+/.test(line));

          const parts = [];

          if (proseLines.length) {
            parts.push(`<p>${escapeHtml(proseLines.join(" "))}</p>`);
          }

          if (bulletLines.length) {
            parts.push(
              `<ul>${bulletLines
                .map((line) => `<li>${escapeHtml(line.replace(/^[-*•]\s+/, ""))}</li>`)
                .join("")}</ul>`
            );
          }

          return `<section class="narrative-section">${parts.join("")}</section>`;
        });

      return `<div class="narrative-stack">${blocks.join("")}</div>`;
    }

    function renderAssistantResponse(data) {
      return `
        <div class="assistant-report">
          ${renderAnswerText(data.answer_text || data.summary || "", data.recommendations?.general || [])}
        </div>
      `;
    }

    function renderSources(data) {
      sources.innerHTML = "";
      (data.sources || []).forEach((source) => {
        const item = document.createElement("li");
        item.className = "source-item";
        const meta = [
          source.author_label || "",
          source.journal || "",
          source.year || source.published_at || "",
          source.publication_type || "",
          source.pmid ? `PMID ${source.pmid}` : "",
        ]
          .filter(Boolean)
          .join(" - ");
        const snippet = trimSnippet(source.excerpt || source.why_it_matters || "");
        const links = [];
        if (source.doi && source.url) {
          links.push(`<a href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">DOI</a>`);
        } else if (source.url) {
          links.push(`<a href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">Open source</a>`);
        }

        if (source.pmid) {
          const pubmedUrl = `https://pubmed.ncbi.nlm.nih.gov/${encodeURIComponent(source.pmid)}/`;
          links.push(`<a href="${pubmedUrl}" target="_blank" rel="noreferrer">PubMed</a>`);
        }

        item.innerHTML = `
          <strong>${escapeHtml(source.title || "Source")}</strong>
          ${meta ? `<div class="source-meta">${escapeHtml(meta)}</div>` : ""}
          ${snippet ? `<div class="source-snippet">${escapeHtml(snippet)}</div>` : ""}
          ${links.length ? `<div class="source-links">${links.join("")}</div>` : ""}
        `;
        sources.appendChild(item);
      });
    }

    async function updateRail(data = {}) {
      const confidenceScore = Number(data.confidence?.score || 0);
      const confidenceLabel = String(data.confidence?.label || "idle");
      const sourceCount = Array.isArray(data.sources) ? data.sources.length : 0;
      const synthesisMode = data.debug?.synthesis_mode || (data.summary ? "synthesized" : "idle");
      const confidencePercent = Math.round(Math.max(0, Math.min(confidenceScore, 1)) * 100);

      railConfidence.textContent = `${confidencePercent}%`;
      railConfidenceLabel.textContent = confidenceLabel;
      railConfidenceBar.style.setProperty("--spark-width", `${Math.max(0, Math.min(confidenceScore * 100, 100))}%`);

      railSources.textContent = String(sourceCount);
      railSourcesBar.style.setProperty("--spark-width", `${Math.max(10, Math.min(sourceCount * 16, 100))}%`);

      railMode.textContent = synthesisMode.replace(/[:_]/g, " ");
      railModeBar.style.setProperty("--spark-width", `${data.summary ? 88 : 68}%`);

      const threadData = getActiveThread();
      if (threadData) {
        threadData.rail = {
          confidenceScore,
          confidencePercent,
          confidenceLabel,
          sourceCount,
          synthesisMode,
        };
        threadData.sources = Array.isArray(data.sources) ? data.sources : [];
        await persistActiveThread();
      }
    }

    function hydrateRailFromThread(threadData) {
      const rail = threadData?.rail || {};
      const confidencePercent =
        typeof rail.confidencePercent === "number"
          ? rail.confidencePercent
          : Math.round(Math.max(0, Math.min(Number(rail.confidenceScore || 0), 1)) * 100);
      railConfidence.textContent = `${confidencePercent}%`;
      railConfidenceLabel.textContent = rail.confidenceLabel || "idle";
      railConfidenceBar.style.setProperty("--spark-width", `${Math.max(0, Math.min(Number(rail.confidenceScore || 0) * 100, 100))}%`);
      railSources.textContent = String(rail.sourceCount || 0);
      railSourcesBar.style.setProperty("--spark-width", `${Math.max(10, Math.min(Number(rail.sourceCount || 0) * 16, 100))}%`);
      railMode.textContent = String(rail.synthesisMode || "idle").replace(/[:_]/g, " ");
      railModeBar.style.setProperty("--spark-width", `${rail.synthesisMode ? 88 : 68}%`);
    }

    function loadThread(threadId) {
      const threadData = chatHistory.find((item) => item.id === threadId);
      if (!threadData) {
        return;
      }

      activeThreadId = threadData.id;
      thread.innerHTML = "";
      if ((threadData.messages || []).length) {
        clearWelcomeState();
        (threadData.messages || []).forEach((message) => {
          const article = document.createElement("article");
          article.className = `message ${message.role}`;
          article.innerHTML = `<div class="message-content">${message.html || ""}</div>`;
          thread.appendChild(article);
        });
      } else {
        renderWelcomeState();
      }

      renderSources({ sources: threadData.sources || [] });
      hydrateRailFromThread(threadData);
      renderHistory();
      scrollThreadToBottom();
    }

    function startNewChat() {
      activeThreadId = createThreadId();
      const threadData = ensureActiveThread();
      renderWelcomeState();
      sources.innerHTML = "";
      threadData.threadState = createEmptyThreadState();
      hydrateRailFromThread(threadData);
      renderHistory();
      return threadData;
    }

    async function submitQuestion(question) {
      const trimmed = String(question || "").trim();
      if (!trimmed) {
        setStatus(status, "error", "Type a question first.");
        return;
      }

      submitButton.disabled = true;
      setStatus(status, "", "");

      const threadData = ensureActiveThread();
      await appendMessage("user", escapeHtml(trimmed), "Now", {
        text: trimmed,
        plainText: trimmed,
      });
      threadData.threadState = deriveThreadState(threadData, trimmed, "");
      await persistActiveThread();
      railMode.textContent = "thinking";

      try {
        const response = await fetch("/api/emersus/recommendation", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            question: trimmed,
            userId: session?.user?.id ? `supabase:${session.user.id}` : "",
            threadState: threadData.threadState,
            recentMessages: buildRecentMessages(threadData.messages),
            includeDebug: true,
          }),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.message || "Unable to generate a recommendation.");
        }

        await appendMessage("assistant", renderAssistantResponse(data), "Now", {
          animate: true,
          plainText: data.answer_text || data.summary || "",
          text: data.answer_text || data.summary || "",
        });
        threadData.threadState = deriveThreadState(
          threadData,
          trimmed,
          data.summary || data.answer_text || ""
        );
        renderSources(data);
        await updateRail(data);
        setStatus(status, "", "");
        form.reset();
      } catch (error) {
        await appendMessage("assistant", `<p>${escapeHtml(error.message || "Request failed.")}</p>`, "Error", {
          animate: true,
          plainText: error.message || "Request failed.",
          text: error.message || "Request failed.",
        });
        threadData.threadState = deriveThreadState(
          threadData,
          trimmed,
          error.message || "Request failed."
        );
        await persistActiveThread();
        setStatus(status, "error", error.message || "Request failed.");
        railMode.textContent = "error";
      } finally {
        submitButton.disabled = false;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      await submitQuestion(formData.get("question"));
    });

    questionInput?.addEventListener("keydown", async (event) => {
      if (event.key !== "Enter" || event.shiftKey) {
        return;
      }

      event.preventDefault();
      if (submitButton.disabled) {
        return;
      }

      await submitQuestion(questionInput.value);
    });

    newChatButton.addEventListener("click", () => {
      startNewChat();
      setStatus(status, "", "");
      questionInput?.focus();
    });

    historyToggleButton.addEventListener("click", () => {
      appShell.classList.toggle("history-hidden");
      updateHistoryToggleButton();
    });

    historyList.addEventListener("click", (event) => {
      const target = event.target.closest("[data-thread-id]");
      if (!target) {
        return;
      }

      loadThread(target.dataset.threadId);
    });

    session = await requireAuth();
    if (!session) {
      throw new Error("Authentication required.");
    }

    updateHistoryToggleButton();

    chatHistory = await loadHistoryFromSupabase();
    if (chatHistory.length) {
      activeThreadId = chatHistory[0].id;
      renderHistory();
      loadThread(activeThreadId);
    } else {
      startNewChat();
      await updateRail({});
      renderHistory();
      await persistActiveThread();
    }
  </script>
</body>
</html>
