<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emersus Chat | Emersus AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/site.css">
  <style>
    :root {
      --chat-shell-padding: 1rem;
      --chat-history-width: 280px;
      --chat-glass: linear-gradient(180deg, rgba(11, 13, 16, 0.92), rgba(9, 11, 14, 0.88));
      --chat-panel: rgba(255, 255, 255, 0.035);
      --chat-panel-strong: rgba(255, 255, 255, 0.055);
      --chat-blur: blur(28px);
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 280, "GRAD" 0, "opsz" 24;
      line-height: 1;
    }

    body.chat-page {
      overflow-x: hidden;
      overflow-y: hidden;
    }

    .chat-app-shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: var(--chat-history-width) minmax(0, 1fr) 330px;
      gap: 1rem;
      height: calc(100vh - 2rem);
      min-height: calc(100vh - 2rem);
      align-items: stretch;
      padding: 1rem;
    }

    .legacy-chat-shell[hidden] {
      display: none !important;
    }

    .chat-app-shell.history-hidden {
      --chat-history-width: 0px;
    }

    .chat-nav,
    .chat-main,
    .chat-rail {
      position: relative;
      overflow: visible;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top left, rgba(109, 159, 255, 0.06), transparent 30%),
        radial-gradient(circle at top right, rgba(159, 251, 0, 0.05), transparent 28%),
        var(--chat-glass);
      box-shadow: var(--shadow);
      backdrop-filter: var(--chat-blur);
    }

    .chat-nav,
    .chat-rail {
      border-radius: 22px;
    }

    .chat-main {
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .chat-nav::before,
    .chat-main::before,
    .chat-rail::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(109, 159, 255, 0.04), rgba(159, 251, 0, 0));
      pointer-events: none;
    }

    .chat-nav {
      display: flex;
      flex-direction: column;
      padding: 2rem 1.25rem 1.2rem;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      transition: opacity 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .chat-app-shell.history-hidden .chat-nav {
      opacity: 0;
      transform: translateX(-12px);
      pointer-events: none;
      border-color: transparent;
    }

    .history-restore-button {
      position: absolute;
      z-index: 30;
      top: 2.45rem;
      left: 1.45rem;
      width: 2.8rem;
      height: 2.8rem;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background:
        radial-gradient(circle at top left, rgba(159, 251, 0, 0.08), transparent 55%),
        rgba(12, 14, 18, 0.94);
      color: var(--ink);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
      backdrop-filter: var(--chat-blur);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .history-restore-button:hover,
    .history-restore-button:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(159, 251, 0, 0.28);
      background:
        radial-gradient(circle at top left, rgba(159, 251, 0, 0.14), transparent 55%),
        rgba(12, 14, 18, 0.98);
      outline: none;
    }

    .chat-brand {
      padding: 0.6rem 0.9rem 1.6rem;
    }

    .chat-brand-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.8rem;
    }

    .chat-nav-actions {
      display: flex;
      justify-content: flex-start;
      padding: 0.9rem 0.15rem 0;
    }

    .chat-brand-mark {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: var(--ink);
      text-transform: uppercase;
    }

    .chat-brand-subtitle {
      margin: 0.4rem 0 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--secondary);
    }

    .chat-nav-list {
      display: grid;
      gap: 0.45rem;
      margin-top: 0.8rem;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      align-content: start;
      padding-right: 0.15rem;
    }

    .chat-nav-list,
    .conversation-canvas,
    .chat-rail {
      scrollbar-width: thin;
      scrollbar-color: rgba(108, 108, 108, 0.95) rgba(18, 18, 18, 0.96);
    }

    .chat-nav-list::-webkit-scrollbar,
    .conversation-canvas::-webkit-scrollbar,
    .chat-rail::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .chat-nav-list::-webkit-scrollbar-track,
    .conversation-canvas::-webkit-scrollbar-track,
    .chat-rail::-webkit-scrollbar-track {
      background: rgba(18, 18, 18, 0.96);
      border-radius: 999px;
    }

    .chat-nav-list::-webkit-scrollbar-thumb,
    .conversation-canvas::-webkit-scrollbar-thumb,
    .chat-rail::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(112, 112, 112, 0.96), rgba(76, 76, 76, 0.96));
      border-radius: 999px;
      border: 2px solid rgba(10, 10, 10, 0.96);
    }

    .chat-nav-list::-webkit-scrollbar-thumb:hover,
    .conversation-canvas::-webkit-scrollbar-thumb:hover,
    .chat-rail::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(138, 138, 138, 0.98), rgba(96, 96, 96, 0.98));
    }

    .chat-nav-link {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.95rem 1rem;
      width: 100%;
      border: 0;
      border-radius: 4px;
      background: transparent;
      text-align: left;
      color: var(--muted);
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .chat-nav-link:hover,
    .chat-nav-link:focus-visible {
      transform: translateX(2px);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.04);
    }

    .chat-nav-link.is-active {
      color: var(--secondary);
      background: rgba(159, 251, 0, 0.08);
      box-shadow: inset 0 0 0 1px rgba(159, 251, 0, 0.08);
    }

    .chat-nav-label {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.86rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .chat-nav-meta {
      display: block;
      margin-top: 0.2rem;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0;
      text-transform: none;
      font-family: "Inter", sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-nav-foot-copy {
      margin: 0;
      color: rgba(255, 255, 255, 0.76);
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .chat-main-body {
      position: relative;
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .conversation-canvas {
      display: flex;
      flex: 1;
      min-height: 0;
      padding: 0.65rem 1.4rem 0.8rem;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      justify-content: center;
    }

    .chat-thread {
      display: grid;
      gap: 0.28rem;
      align-content: start;
      min-height: min-content;
      width: 100%;
      max-width: 760px;
      overflow: visible;
      padding-right: 0;
    }

    .chat-thread.is-empty {
      min-height: 100%;
      align-content: center;
    }

    .thread-welcome {
      display: grid;
      gap: 0.9rem;
      max-width: 46rem;
      padding: 0 0.2rem;
    }

    .thread-welcome-eyebrow {
      margin: 0;
      color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .thread-welcome-title {
      margin: 0;
      color: var(--ink);
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2.75rem, 7vw, 4.8rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 0.96;
    }

    .thread-welcome-copy {
      margin: 0;
      max-width: 33rem;
      color: rgba(255, 255, 255, 0.72);
      font-size: 1rem;
      line-height: 1.7;
    }

    .message {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      padding: 0;
      border-radius: 0;
      line-height: 1.68;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      overflow: visible;
    }

    .message::before {
      display: none;
    }

    .message.user {
      text-align: right;
    }

    .message.assistant {
      text-align: left;
    }

    .message-meta {
      display: none;
    }

    .message-content {
      display: grid;
      gap: 0.12rem;
      font-size: 1rem;
    }

    /* Dashboard-style grid for assistant messages: cards flow into a 12-col
       layout with per-type column spans, filling the canvas like an editorial
       layout instead of stacking in a single column. */
    .message.assistant .message-content {
      grid-template-columns: repeat(12, minmax(0, 1fr));
      grid-auto-flow: dense;
      gap: 0.7rem;
      align-items: start;
    }

    .message.assistant .chat-text-block,
    .message.assistant .chat-bubble {
      grid-column: span 12;
      max-width: none;
      width: 100%;
      min-width: 0;
    }

    .message.assistant .message-content > * {
      min-width: 0;
      max-width: 100%;
    }

    .message.assistant .chat-insight--metric_grid  { grid-column: span 12; }
    .message.assistant .chat-insight--action_grid  { grid-column: span 12; }
    .message.assistant .chat-insight--source_highlights { grid-column: span 7; }
    .message.assistant .chat-insight--watchouts { grid-column: span 5; }

    .message.assistant .chat-tool-card { grid-column: span 12; }

    @media (max-width: 900px) {
      .message.assistant .message-content {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }
      .message.assistant .chat-insight--action_grid,
      .message.assistant .chat-insight--source_highlights,
      .message.assistant .chat-insight--watchouts { grid-column: span 6; }
    }

    .message-html {
      width: 100%;
      white-space: normal;
      overflow-x: auto;
    }

    .message.user .message-content {
      justify-items: end;
      margin-left: auto;
      font-style: italic;
      color: rgba(255, 255, 255, 0.88);
    }

    .message.assistant.is-revealing .message-content {
      opacity: 0.98;
    }

    .message.assistant.is-revealing ul,
    .message.assistant.is-revealing ol {
      list-style: none;
    }

    .assistant-report {
      display: grid;
      gap: 0.65rem;
    }

    .chat-text-block {
      display: grid;
      gap: 0.26rem;
    }

    .chat-text-block p {
      margin: 0;
    }

    .chat-text-block ul {
      margin: 0.05rem 0 0;
      padding-left: 1rem;
      display: grid;
      gap: 0.18rem;
    }

    .chat-card {
      border-radius: 12px;
      background:
        radial-gradient(circle at top left, rgba(133, 173, 255, 0.08), transparent 32%),
        linear-gradient(135deg, rgba(35, 38, 42, 0.82), rgba(17, 20, 23, 0.9));
      padding: 0.95rem 1rem;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.045),
        0 22px 58px rgba(0, 0, 0, 0.18);
    }

    .chat-bubble {
      max-width: 700px;
      border-radius: 22px 22px 22px 14px;
      background: rgba(255, 255, 255, 0.02);
      padding: 0;
    }

    .chat-bubble-user {
      border-radius: 22px 22px 14px 22px;
      background: transparent;
    }

    .chat-tool-card {
      padding: 0;
      overflow: hidden;
    }

    .chat-tool-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.9rem;
      padding: 0.8rem 0.95rem;
      background: linear-gradient(90deg, rgba(35, 38, 42, 0.92), rgba(17, 20, 23, 0.72));
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.035);
      cursor: pointer;
    }

    .chat-tool-card.is-running .chat-tool-header {
      background: rgba(109, 159, 255, 0.08);
    }

    .chat-tool-card.is-error .chat-tool-header {
      background: rgba(255, 125, 125, 0.08);
    }

    .chat-tool-header-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }

    .chat-tool-toggle {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 0;
      font-size: 1.12rem;
      line-height: 1;
      cursor: pointer;
    }

    .chat-tool-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.35rem;
      min-width: 1.35rem;
      color: var(--primary);
      font-size: 1.04rem;
      font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 20;
    }

    .chat-tool-title-group {
      display: grid;
      gap: 0.1rem;
      min-width: 0;
    }

    .chat-tool-title {
      color: var(--ink);
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .chat-tool-subtitle {
      color: var(--muted);
      font-size: 0.68rem;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .chat-tool-status {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
      color: rgba(255, 255, 255, 0.7);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .chat-tool-status.is-good {
      color: var(--secondary);
    }

    .chat-tool-status.is-medium {
      color: var(--primary-dim);
    }

    .chat-tool-status.is-caution {
      color: #ffbf54;
    }

    .chat-tool-status-icon {
      font-size: 0.9rem;
      font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 20;
      line-height: 1;
    }

    .chat-tool-body {
      border-top: 0;
      padding: 0.9rem 0.95rem 1rem;
      background: rgba(12, 14, 17, 0.34);
    }

    .chat-tool-card.is-collapsed .chat-tool-header {
      box-shadow: none;
    }

    .chat-tool-copy {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .chat-artifact-container {
      overflow: hidden;
      min-height: 420px;
      border-radius: 12px;
      background: #11110f;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.055);
    }

    .chat-artifact-frame {
      display: block;
      width: 100%;
      min-height: 420px;
      border: 0;
      background: transparent;
      overflow: hidden;
    }

    .chat-command-strip,
    .chat-file-path {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.7rem 0.8rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.045);
      color: rgba(255, 255, 255, 0.74);
      font-size: 0.8rem;
    }

    .chat-command-prompt,
    .chat-command-text,
    .chat-terminal-output,
    .chat-code-pane {
      font-family: "IBM Plex Mono", monospace;
    }

    .chat-command-text {
      color: var(--ink);
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-terminal-output,
    .chat-code-pane {
      margin: 0;
      max-height: 260px;
      overflow: auto;
      border-radius: 10px;
      background: rgba(8, 10, 14, 0.92);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.045);
      padding: 0.85rem 0.9rem;
      color: rgba(255, 255, 255, 0.84);
      font-size: 0.8rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-search-results,
    .chat-group-card {
      gap: 0.55rem;
    }

    .chat-search-row,
    .chat-group-row {
      display: grid;
      gap: 0.22rem;
      padding: 0.75rem 0.8rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.045);
    }

    .chat-search-title,
    .chat-group-tool {
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .chat-search-secondary,
    .chat-search-snippet,
    .chat-group-status {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.45;
    }

    .chat-article-viz {
      gap: 0.9rem;
    }

    .chat-viz-section {
      display: grid;
      gap: 0.45rem;
    }

    .chat-viz-heading,
    .chat-viz-label,
    .chat-viz-chip-label,
    .chat-viz-journal-name {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.08em;
    }

    .chat-viz-heading {
      color: var(--primary-dim);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .chat-viz-bars {
      display: grid;
      gap: 0.38rem;
    }

    .chat-viz-row,
    .chat-viz-journal-item {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) auto;
      gap: 0.6rem;
      align-items: center;
    }

    .chat-viz-label,
    .chat-viz-value,
    .chat-viz-journal-count,
    .chat-viz-chip-value {
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.78rem;
      font-weight: 600;
    }

    .chat-viz-track {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      overflow: hidden;
    }

    .chat-viz-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(109, 159, 255, 0.86), rgba(159, 251, 0, 0.8));
    }

    .chat-viz-chip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.55rem;
    }

    .chat-viz-chip {
      display: grid;
      gap: 0.18rem;
      padding: 0.72rem 0.78rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.045);
    }

    .chat-viz-chip-label {
      color: var(--muted);
      font-size: 0.64rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .chat-viz-journal-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 0.36rem;
    }

    .chat-viz-journal-item {
      grid-template-columns: minmax(0, 1fr) auto;
      padding: 0.42rem 0;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.035);
    }

    .chat-viz-journal-item:last-child {
      box-shadow: none;
    }

    .chat-viz-journal-name {
      color: rgba(255, 255, 255, 0.74);
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .chat-quant-viz {
      gap: 0.75rem;
    }

    .chat-quant-group {
      display: grid;
      gap: 0.55rem;
      padding: 0.78rem 0.82rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.045);
    }

    .chat-quant-group-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .chat-quant-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 0.75rem;
      align-items: start;
      padding-top: 0.08rem;
    }

    .chat-quant-value {
      margin: 0;
      color: var(--secondary);
      font-family: "Space Grotesk", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.04em;
      padding: 0.25rem 0.5rem;
      border-radius: 999px;
      background: rgba(159, 251, 0, 0.08);
      box-shadow: inset 0 0 0 1px rgba(159, 251, 0, 0.12);
    }

    .chat-quant-label,
    .chat-quant-unit,
    .chat-quant-source {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.4;
    }

    .chat-quant-label {
      margin: 0;
      color: var(--ink);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .chat-quant-unit {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .chat-quant-range {
      display: grid;
      gap: 0.22rem;
      padding: 0.25rem 0.1rem 0.1rem;
    }

    .chat-quant-range-rail {
      position: relative;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
    }

    .chat-quant-range-rail::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(109, 159, 255, 0.32), rgba(159, 251, 0, 0.34));
    }

    .chat-quant-dot {
      position: absolute;
      top: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: var(--secondary);
      border: 2px solid rgba(8, 10, 14, 0.95);
      box-shadow: 0 0 12px rgba(159, 251, 0, 0.28);
    }

    .chat-quant-scale {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.68rem;
    }

    .chat-quant-content {
      display: grid;
      gap: 0.28rem;
    }

    .chat-quant-sentence {
      margin: 0;
      color: rgba(255, 255, 255, 0.84);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .chat-quant-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .chat-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .chat-card-title {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary-dim);
    }

    .chat-card-status {
      color: var(--secondary);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .chat-card-body {
      display: grid;
      gap: 0.75rem;
    }

    .chat-insight-card {
      gap: 0.8rem;
    }

    .chat-insight-title {
      margin: 0;
      color: var(--ink);
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .chat-insight-copy,
    .chat-card-footnote {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.92rem;
      line-height: 1.55;
    }

    .chat-chip-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.6rem;
    }

    .chat-comparison-bars {
      display: grid;
      gap: 0.44rem;
      padding-top: 0.05rem;
    }

    .chat-comparison-row {
      display: grid;
      gap: 0.22rem;
    }

    .chat-comparison-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .chat-comparison-label,
    .chat-comparison-value,
    .chat-sparkline-label {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .chat-comparison-label,
    .chat-sparkline-label {
      color: var(--muted);
    }

    .chat-comparison-value {
      color: rgba(255, 255, 255, 0.72);
    }

    .chat-comparison-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      overflow: hidden;
    }

    .chat-comparison-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(109, 159, 255, 0.85), rgba(159, 251, 0, 0.82));
    }

    .chat-comparison-fill.is-caution {
      background: linear-gradient(90deg, rgba(255, 191, 84, 0.92), rgba(255, 150, 64, 0.82));
    }

    .chat-data-chip {
      display: grid;
      gap: 0.18rem;
      padding: 0.7rem 0.8rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.045);
    }

    .chat-data-chip.is-good,
    .chat-score-fill.is-good,
    .chat-action-panel.is-good {
      box-shadow: inset 0 0 0 1px rgba(159, 251, 0, 0.12);
    }

    .chat-data-chip.is-medium,
    .chat-score-fill.is-medium,
    .chat-action-panel.is-medium {
      box-shadow: inset 0 0 0 1px rgba(109, 159, 255, 0.12);
    }

    .chat-data-chip.is-caution,
    .chat-score-fill.is-caution,
    .chat-action-panel.is-caution {
      box-shadow: inset 0 0 0 1px rgba(255, 191, 84, 0.14);
    }

    .chat-data-chip-label,
    .chat-score-label,
    .chat-action-heading {
      color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .chat-data-chip-value {
      color: var(--ink);
      font-size: 0.96rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .chat-score-list {
      display: grid;
      gap: 0.62rem;
    }

    .chat-score-row {
      display: grid;
      gap: 0.32rem;
    }

    .chat-score-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .chat-score-value {
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .chat-score-track {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .chat-score-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(109, 159, 255, 0.9), rgba(159, 251, 0, 0.85));
      box-shadow: none;
    }

    .chat-score-fill.is-caution {
      background: linear-gradient(90deg, rgba(255, 191, 84, 0.95), rgba(255, 150, 64, 0.85));
    }

    .chat-sparkline {
      display: grid;
      gap: 0.28rem;
      padding-top: 0.1rem;
    }

    .chat-sparkline svg {
      width: 100%;
      height: 54px;
      overflow: visible;
    }

    .chat-sparkline-line {
      fill: none;
      stroke: rgba(159, 251, 0, 0.92);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chat-sparkline-area {
      fill: rgba(109, 159, 255, 0.12);
    }

    .chat-sparkline-dot {
      fill: rgba(255, 255, 255, 0.9);
      stroke: rgba(159, 251, 0, 0.92);
      stroke-width: 1.4;
    }

    .chat-action-columns {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.65rem;
    }

    .chat-action-panel {
      display: grid;
      gap: 0.5rem;
      padding: 0.78rem 0.85rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.045);
    }

    .chat-action-heading {
      margin: 0;
    }

    .chat-action-list,
    .chat-watchout-list {
      margin: 0;
      padding-left: 1rem;
      display: grid;
      gap: 0.28rem;
    }

    .chat-action-list li,
    .chat-watchout-list li {
      color: rgba(255, 255, 255, 0.84);
      line-height: 1.5;
    }

    .chat-metric-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .chat-metric-grid-quad {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.55rem;
      margin: 0.6rem 0 0.85rem;
    }

    @media (max-width: 720px) {
      .chat-metric-grid-quad {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .chat-metric-tile {
      padding: 0.85rem 0.8rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.035);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.055);
      display: grid;
      gap: 0.2rem;
    }

    .chat-metric-tile.tone-positive { box-shadow: inset 0 0 0 1px rgba(29, 158, 117, 0.45); }
    .chat-metric-tile.tone-neutral  { box-shadow: inset 0 0 0 1px rgba(186, 117, 23, 0.4); }
    .chat-metric-tile.tone-info     { box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.4); }

    .chat-metric-tile-value {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.05;
    }
    .chat-metric-tile-label {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.3;
    }
    .chat-metric-tile-sub {
      font-size: 0.65rem;
      color: var(--muted);
      opacity: 0.7;
    }

    .chat-metric-evidence {
      list-style: none;
      margin: 0.4rem 0 0;
      padding: 0;
      display: grid;
      gap: 0.45rem;
    }
    .chat-metric-evidence-item {
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
    }
    .chat-metric-evidence-sentence {
      margin: 0 0 0.2rem;
      font-size: 0.78rem;
      color: var(--ink);
      line-height: 1.45;
    }
    .chat-metric-evidence-source {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .chat-metric-item {
      display: grid;
      gap: 0.25rem;
      padding: 0.7rem 0.75rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.045);
    }

    .chat-metric-label {
      color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .chat-metric-value {
      color: var(--ink);
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .chat-source-preview {
      gap: 0.65rem;
    }

    .chat-source-item {
      display: grid;
      gap: 0.3rem;
      padding: 0.8rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.045);
    }

    .chat-source-item strong {
      color: var(--secondary);
      font-size: 0.95rem;
      line-height: 1.35;
    }

    .chat-source-item p {
      margin: 0;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .chat-source-meta {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.45;
    }

    .chat-source-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      padding-top: 0.12rem;
    }

    .chat-source-link {
      color: var(--primary);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .chat-source-link:hover {
      color: var(--secondary);
    }

    .narrative-section ul,
    .watchout-list {
      margin: 0;
      padding-left: 1rem;
      display: grid;
      gap: 0.18rem;
    }

    .narrative-section li,
    .watchout-list li {
      color: rgba(255, 255, 255, 0.88);
    }

    .watchout-list {
      list-style: disc;
    }

    .narrative-stack {
      display: grid;
      gap: 0.22rem;
    }

    .narrative-section {
      display: grid;
      gap: 0.1rem;
      border-top: 0;
      padding-top: 0;
    }

    .narrative-section > p {
      margin: 0;
    }

    .narrative-section > p + p {
      margin-top: 0.14rem;
    }

    .narrative-section > ul {
      margin-top: 0.04rem;
    }

    .narrative-heading {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .chat-composer-shell {
      padding: 0 1.4rem 1.2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      background: linear-gradient(180deg, rgba(12, 14, 18, 0), rgba(12, 14, 18, 0.58));
      flex-shrink: 0;
      position: relative;
    }

    .thinking-glyph-mount {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 0.4rem 0.4rem 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      pointer-events: none;
      min-height: 56px;
    }

    .thinking-glyph-mount canvas {
      display: block;
      filter: drop-shadow(0 0 18px rgba(83, 74, 183, 0.35));
      transition: opacity 240ms ease, transform 240ms ease, filter 240ms ease;
    }

    .thinking-glyph-mount[data-state="idle"] canvas {
      opacity: 0.85;
      transform: scale(0.9);
      filter: drop-shadow(0 0 6px rgba(83, 74, 183, 0.18));
    }

    .thinking-glyph-mount[data-state="thinking"] canvas,
    .thinking-glyph-mount[data-state="responding"] canvas {
      opacity: 1;
      transform: scale(1);
    }

    .thinking-glyph-label {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(200, 195, 220, 0.55);
      transition: color 220ms ease, opacity 220ms ease;
      opacity: 0;
    }

    .thinking-glyph-mount[data-state="thinking"] .thinking-glyph-label,
    .thinking-glyph-mount[data-state="responding"] .thinking-glyph-label {
      opacity: 1;
    }

    .thinking-glyph-mount[data-state="thinking"] .thinking-glyph-label {
      color: rgba(159, 251, 0, 0.78);
    }

    .thinking-glyph-mount[data-state="responding"] .thinking-glyph-label {
      color: rgba(140, 200, 255, 0.72);
    }

    .composer {
      display: grid;
      gap: 0.85rem;
      margin-top: 1rem;
      margin-left: auto;
      margin-right: auto;
      width: min(100%, 720px);
      padding: 0.85rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top left, rgba(109, 159, 255, 0.06), transparent 24%),
        rgba(255, 255, 255, 0.035);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
    }

    .composer-row {
      display: flex;
      align-items: flex-end;
      gap: 0.85rem;
    }

    .composer textarea {
      min-height: 4rem;
      max-height: 9rem;
      flex: 1;
      resize: none;
      border: 0;
      background: transparent;
      color: var(--ink);
      line-height: 1.6;
      padding: 0.35rem 0.25rem 0.35rem 0;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .composer textarea:focus {
      outline: none;
    }

    .composer textarea::-webkit-scrollbar {
      display: none;
    }

    .composer textarea::placeholder {
      color: #6d7480;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding-right: 0.3rem;
    }

    .submit-orb {
      width: 3rem;
      height: 3rem;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--secondary), var(--primary-dim));
      color: #040806;
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px rgba(159, 251, 0, 0.25);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .submit-orb:hover,
    .submit-orb:focus-visible {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 0 30px rgba(159, 251, 0, 0.3);
    }

    .composer-utility-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      padding: 0 0.45rem 0.2rem;
    }

    .composer-buttons {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
    }

    .inline-button {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--ink);
      border-radius: 10px;
      padding: 0.55rem 0.9rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .inline-button:hover,
    .inline-button:focus-visible {
      background: rgba(255, 255, 255, 0.08);
    }

    .inline-button[data-history-toggle] {
      min-width: 2.5rem;
      justify-content: center;
      padding-inline: 0.72rem;
    }

    .status-text {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
      text-align: right;
    }

    .chat-rail {
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 1rem;
      min-height: 0;
      height: 100%;
      padding: 1rem;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .rail-card {
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background:
        radial-gradient(circle at top left, rgba(109, 159, 255, 0.06), transparent 28%),
        rgba(255, 255, 255, 0.03);
      padding: 1.2rem 1.15rem;
    }

    .rail-title {
      margin: 0 0 1rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--primary-dim);
    }

    .rail-metric-stack {
      display: grid;
      gap: 1rem;
    }

    .rail-metric {
      display: grid;
      gap: 0.4rem;
    }

    .rail-metric-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 0.75rem;
    }

    .rail-metric-label {
      margin: 0;
      color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .rail-metric-value {
      margin: 0;
      font-size: 2rem;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .rail-metric-note {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--secondary);
    }

    .rail-spark {
      height: 0.65rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
      position: relative;
    }

    .rail-spark::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--spark-width, 50%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary-dim), var(--secondary));
    }

    .rail-spark.tone-medium::before {
      background: linear-gradient(90deg, rgba(240, 179, 74, 0.95), rgba(202, 129, 27, 0.95));
    }

    .rail-spark.tone-caution::before {
      background: linear-gradient(90deg, rgba(255, 143, 157, 0.95), rgba(188, 74, 91, 0.95));
    }

    .source-list {
      display: grid;
      gap: 0.75rem;
      margin: 0;
      padding: 0;
      list-style: none;
      min-height: auto;
      overflow: visible;
      padding-right: 0;
    }

    .source-item {
      padding: 0.95rem 1rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .source-item strong {
      display: block;
      margin-bottom: 0.35rem;
      color: var(--secondary);
      font-size: 0.98rem;
      line-height: 1.35;
    }

    .source-meta {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.5;
      margin-bottom: 0.55rem;
    }

    .source-snippet {
      color: rgba(255, 255, 255, 0.84);
      font-size: 0.92rem;
      line-height: 1.55;
      margin-bottom: 0.65rem;
    }

    .source-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      font-size: 0.84rem;
    }

    .source-links a {
      color: var(--primary-dim);
    }

    .rail-foot {
      margin-top: auto;
      display: grid;
      gap: 0.55rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .rail-foot-line {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1280px) {
      body.chat-page {
        overflow: auto;
      }

      .chat-app-shell {
        grid-template-columns: 250px minmax(0, 1fr);
      }

      .chat-rail {
        grid-column: 1 / -1;
        min-height: auto;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: none;
      }

      .rail-card:last-of-type {
        min-height: 300px;
      }

      .rail-foot {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 980px) {
      .chat-app-shell {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
        padding: 0.8rem;
      }

      .chat-nav,
      .chat-main,

  </style>
</head>

  <script type="module" src="/shared/react-chat-app.js"></script>
  <script type="text/plain" data-legacy-chat-script>
    import {
      listChatThreads,
      requireAuth,
      setStatus,
      upsertChatThread,
    } from "/shared/supabase.js";
    import { renderMessageBlocks } from "/shared/chat-blocks.js";

    const form = document.querySelector("[data-chat-form]");
    const questionInput = document.getElementById("chat-question");
    const thread = document.querySelector("[data-chat-thread]");
    const status = document.querySelector("[data-chat-status]");
    const sources = document.querySelector("[data-chat-sources]");
    const submitButton = document.querySelector("[data-chat-submit]");
    const historyToggleButton = document.querySelector("[data-history-toggle]");
    const newChatButton = document.querySelector("[data-chat-new]");
    const historyList = document.querySelector("[data-chat-history]");
    const appShell = document.querySelector(".chat-app-shell");
    const conversationCanvas = document.querySelector(".conversation-canvas");
    const railConfidence = document.querySelector("[data-rail-confidence]");
    const railConfidenceLabel = document.querySelector("[data-rail-confidence-label]");
    const railConfidenceBar = document.querySelector("[data-rail-confidence-bar]");
    const railSources = document.querySelector("[data-rail-sources]");
    const railSourcesBar = document.querySelector("[data-rail-sources-bar]");
    const railMode = document.querySelector("[data-rail-mode]");
    const railModeBar = document.querySelector("[data-rail-mode-bar]");
    const MAX_HISTORY_ITEMS = 24;
    let chatHistory = [];
    let activeThreadId = "";
    let session = null;

    function scrollThreadToBottom() {
      conversationCanvas.scrollTo({
        top: conversationCanvas.scrollHeight,
        behavior: "smooth",
      });
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function animateHtmlInto(container, html) {
      const template = document.createElement("template");
      template.innerHTML = String(html || "").trim();
      const fragment = template.content.cloneNode(true);
      const walker = document.createTreeWalker(fragment, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          return node.textContent.trim() ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
        },
      });

      const textNodes = [];
      let currentNode = walker.nextNode();
      while (currentNode) {
        textNodes.push(currentNode);
        currentNode = walker.nextNode();
      }

      const tokensByNode = textNodes.map((node) => node.textContent.match(/\S+\s*/g) || [node.textContent]);
      textNodes.forEach((node) => {
        node.textContent = "";
      });

      container.appendChild(fragment);
      scrollThreadToBottom();

      for (let nodeIndex = 0; nodeIndex < textNodes.length; nodeIndex += 1) {
        const node = textNodes[nodeIndex];
        const tokens = tokensByNode[nodeIndex];

        for (let tokenIndex = 0; tokenIndex < tokens.length; tokenIndex += 1) {
          node.textContent += tokens[tokenIndex];
          if (tokenIndex % 3 === 0) {
            scrollThreadToBottom();
            await wait(14);
          }
        }

        scrollThreadToBottom();
        await wait(18);
      }
    }

    async function animateBlockNodesInto(container, fragment) {
      const staging = document.createElement("div");
      staging.appendChild(fragment);

      const textBlock = staging.querySelector(".chat-text-block");
      const animatedHost = document.createElement("div");
      animatedHost.className = "chat-text-block";
      container.appendChild(animatedHost);

      if (textBlock) {
        // Move the text block's child nodes (already-safe DOM) into the animated host
        // instead of round-tripping through innerHTML, which would re-parse any
        // HTML-looking text content as live markup.
        while (textBlock.firstChild) {
          animatedHost.appendChild(textBlock.firstChild);
        }
        textBlock.remove();
      }

      while (staging.firstChild) {
        container.appendChild(staging.firstChild);
      }

      scrollThreadToBottom();
    }

    async function appendMessage(role, content, stamp, options = {}) {
      clearWelcomeState();
      const article = document.createElement("article");
      article.className = `message ${role}`;
      article.innerHTML = `
        <div class="message-content"></div>
      `;
      const body = article.querySelector(".message-content");
      thread.appendChild(article);

      if (options.blocks && role === "assistant") {
        const fragment = renderMessageBlocks(options.blocks);

        if (options.animate) {
          article.classList.add("is-revealing");
          await animateBlockNodesInto(body, fragment);
          article.classList.remove("is-revealing");
        } else {
          body.appendChild(fragment);
          scrollThreadToBottom();
        }

        if (options.persist !== false) {
          const threadData = ensureActiveThread();
          threadData.messages.push({
            role,
            html: body.innerHTML,
            plainText: String(options.plainText || ""),
            text: String(options.text || ""),
            createdAt: new Date().toISOString(),
          });
          await persistActiveThread();
        }

        return;
      }

      if (options.animate && role === "assistant") {
        article.classList.add("is-revealing");
        await animateHtmlInto(body, content);
        article.classList.remove("is-revealing");
      } else {
        body.innerHTML = content;
        scrollThreadToBottom();
      }

      if (options.persist !== false) {
        const threadData = ensureActiveThread();
        threadData.messages.push({
          role,
          html: String(content || ""),
          plainText: String(options.plainText || ""),
          text: String(options.text || ""),
          createdAt: new Date().toISOString(),
        });
        await persistActiveThread();
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function trimSnippet(value, maxLength = 320) {
      const text = String(value || "").replace(/\s+/g, " ").trim();
      if (!text) {
        return "";
      }

      return text.length > maxLength ? `${text.slice(0, maxLength - 1).trim()}...` : text;
    }

    function createThreadId() {
      if (window.crypto?.randomUUID) {
        return window.crypto.randomUUID();
      }

      return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (char) => {
        const random = Math.floor(Math.random() * 16);
        const value = char === "x" ? random : (random & 0x3) | 0x8;
        return value.toString(16);
      });
    }

    function getDisplayName() {
      const profileName =
        session?.user?.user_metadata?.display_name ||
        session?.user?.user_metadata?.full_name ||
        session?.user?.user_metadata?.name ||
        session?.user?.email?.split("@")[0] ||
        "there";

      return String(profileName || "there").trim();
    }

    function normalizeCompactText(value, maxLength = 240) {
      return String(value || "").replace(/\s+/g, " ").trim().slice(0, maxLength);
    }

    function normalizeCompactList(values, maxItems = 6, maxLength = 80) {
      if (!Array.isArray(values)) {
        return [];
      }

      return values
        .map((value) => normalizeCompactText(value, maxLength))
        .filter(Boolean)
        .filter((value, index, array) => array.indexOf(value) === index)
        .slice(0, maxItems);
    }

    function createEmptyThreadState() {
      return {
        version: 1,
        primary_topic: "",
        secondary_topics: [],
        goal_context: "",
        question_mode: "",
        recent_entities: [],
        comparison_target: "",
        population_context: [],
        constraints: {
          dietary: [],
          injury: [],
          equipment: [],
          schedule: [],
          sleep_stress: [],
          medical_caution: [],
        },
        last_user_intent: "",
        last_answer_summary: "",
        thread_summary: "",
        updated_at: "",
      };
    }

    function mergeThreadState(rawState) {
      const base = createEmptyThreadState();
      const incoming = rawState && typeof rawState === "object" ? rawState : {};

      return {
        ...base,
        ...incoming,
        secondary_topics: normalizeCompactList(incoming.secondary_topics, 4),
        recent_entities: normalizeCompactList(incoming.recent_entities, 8),
        population_context: normalizeCompactList(incoming.population_context, 4),
        constraints: {
          ...base.constraints,
          ...(incoming.constraints && typeof incoming.constraints === "object" ? incoming.constraints : {}),
          dietary: normalizeCompactList(incoming?.constraints?.dietary, 4),
          injury: normalizeCompactList(incoming?.constraints?.injury, 4),
          equipment: normalizeCompactList(incoming?.constraints?.equipment, 4),
          schedule: normalizeCompactList(incoming?.constraints?.schedule, 4),
          sleep_stress: normalizeCompactList(incoming?.constraints?.sleep_stress, 4),
          medical_caution: normalizeCompactList(incoming?.constraints?.medical_caution, 4),
        },
      };
    }

    function questionLooksLikeFollowUp(question) {
      return /^(yes|yeah|yep|sure|please|do that|that one|sounds good|ok|okay|what about|how about|and for|compare that|compare it|does that|would that|what if|and if|for women|for men|for older adults|for beginners|for me)\b/i.test(
        String(question || "").trim()
      );
    }

    function questionLooksLikeAffirmation(question) {
      return /^(yes|yeah|yep|sure|please|do that|that one|sounds good|ok|okay)\b/i.test(
        String(question || "").trim()
      );
    }

    function matchPrimaryTopic(text) {
      const topicMatchers = [
        [/bpc[-\s]?157|body protection compound/, "BPC-157"],
        [/thymosin beta[-\s]?4|tb[-\s]?500|tb500/, "thymosin beta-4"],
        [/collagen peptide|hydrolyzed collagen|gelatin/, "collagen peptides"],
        [/bioactive peptide/, "bioactive peptides"],
        [/glp[-\s]?1|semaglutide|liraglutide|tirzepatide/, "GLP-1 peptides"],
        [/growth hormone releasing|ghrp|cjc[-\s]?1295|ipamorelin|tesamorelin|ghrelin|secretagogue/, "growth hormone peptides"],
        [/\bpeptide\b|\bpeptides\b/, "peptides"],
        [/creatine/, "creatine"],
        [/\bvo2\b|\bvo2 max\b|maximal oxygen uptake|cardiorespiratory fitness/, "vo2 max"],
        [/resting heart rate|rhr/, "resting heart rate"],
        [/ashwagandha/, "ashwagandha"],
        [/tongkat ali|eurycoma|eurycome/, "tongkat ali"],
        [/turkesterone/, "turkesterone"],
        [/testosterone/, "testosterone"],
        [/caffeine/, "caffeine"],
        [/study|studying|learn|learning|exam|homework|memorization|flashcard|test prep|school/, "studying"],
        [/protein|amino acid|bcaa|eaa|whey|casein/, "protein"],
        [/sleep|circadian/, "sleep"],
        [/beta[-\s]?alanine/, "beta-alanine"],
        [/citrulline/, "citrulline"],
        [/zone 2|endurance|running|cardio|interval|hiit/, "endurance"],
        [/hypertrophy|muscle gain|build muscle/, "hypertrophy"],
        [/fat loss|cutting|weight loss|caloric deficit/, "fat loss"],
        [/safe|safety|risk|harm|side effect|contraindication|adverse/, "safety"],
        [/dose|dosage|duration|protocol|loading phase|maintenance/, "protocol"],
        [/recovery|soreness|rehab|tendon|joint|injury/, "recovery"],
      ];

      for (const [pattern, topic] of topicMatchers) {
        if (pattern.test(text)) {
          return topic;
        }
      }

      return "";
    }

    function inferPrimaryTopic(question, previousTopic = "") {
      const text = String(question || "").toLowerCase();

      if (!text) {
        return previousTopic || "";
      }
      if (questionLooksLikeAffirmation(question)) {
        return "";
      }

      const explicitTopic = matchPrimaryTopic(text);

      if (explicitTopic) {
        return explicitTopic;
      }

      if (questionLooksLikeFollowUp(question) && previousTopic) {
        return previousTopic;
      }

      return "";
    }

    function inferGoalContext(question, previousGoal = "") {
      const text = String(question || "").toLowerCase();

      if (/hypertrophy|muscle gain|build muscle|lean mass/.test(text)) {
        return "hypertrophy";
      }
      if (/fat loss|cutting|lose fat|weight loss|deficit/.test(text)) {
        return "fat_loss";
      }
      if (/vo2|endurance|running|cardio|zone 2|aerobic/.test(text)) {
        return "endurance";
      }
      if (/recovery|soreness|sleep|stress/.test(text)) {
        return "recovery";
      }
      if (/safe|safety|risk|harm|side effect|contraindication|adverse/.test(text)) {
        return "safety";
      }
      if (/dose|dosage|duration|protocol|loading phase|maintenance/.test(text)) {
        return "protocol";
      }
      if (questionLooksLikeAffirmation(question)) {
        return "";
      }

      if (questionLooksLikeFollowUp(question)) {
        return previousGoal || "";
      }

      return "";
    }

    function inferQuestionMode(question) {
      const text = String(question || "").toLowerCase();

      if (questionLooksLikeAffirmation(question)) {
        return "confirmation";
      }
      if (/\bcompare\b|\bversus\b|\bvs\b/.test(text)) {
        return "comparison";
      }
      if (/what should i do|how should i|plan|schedule|dose|dosage|program/.test(text)) {
        return "action_plan";
      }
      if (/for women|for men|for me|if i'm|if i am|what about/.test(text)) {
        return "personalization";
      }
      if (/safe|safety|risk|harm|side effect|contraindication/.test(text)) {
        return "safety";
      }

      return "evidence";
    }

    function extractComparisonTarget(question) {
      const text = String(question || "");
      const match =
        text.match(/\b(?:compare|versus|vs\.?)\s+([a-z0-9][a-z0-9\s-]{1,50})/i) ||
        text.match(/\bhow does .* compare to\s+([a-z0-9][a-z0-9\s-]{1,50})/i);
      return normalizeCompactText(match?.[1] || "", 60).replace(/[?.!,;:]+$/, "");
    }

    function extractPopulationContext(question) {
      const text = String(question || "").toLowerCase();
      const populations = [];

      if (/\bwomen\b|\bfemale\b/.test(text)) populations.push("women");
      if (/\bmen\b|\bmale\b/.test(text)) populations.push("men");
      if (/older adults|elderly|aging/.test(text)) populations.push("older adults");
      if (/beginner|novice/.test(text)) populations.push("beginners");
      if (/athlete|trained|resistance-trained/.test(text)) populations.push("trained adults");

      return normalizeCompactList(populations, 3, 50);
    }

    function extractRecentEntities(question, topic, comparisonTarget) {
      const text = String(question || "").toLowerCase();
      const entities = [];

      if (topic) entities.push(topic);
      if (comparisonTarget) entities.push(comparisonTarget);
      if (/muscle|hypertrophy|lean mass/.test(text)) entities.push("muscle gain");
      if (/strength/.test(text)) entities.push("strength");
      if (/recovery|soreness/.test(text)) entities.push("recovery");
      if (/sleep/.test(text)) entities.push("sleep");
      if (/women|female/.test(text)) entities.push("women");
      if (/cutting|fat loss|deficit/.test(text)) entities.push("fat loss");
      if (/vo2|cardio|endurance|aerobic/.test(text)) entities.push("endurance");
      if (/bpc[-\s]?157|body protection compound/.test(text)) entities.push("BPC-157");
      if (/thymosin|tb[-\s]?500|tb500/.test(text)) entities.push("thymosin beta-4");
      if (/collagen peptide|hydrolyzed collagen|gelatin/.test(text)) entities.push("collagen peptides");
      if (/glp[-\s]?1|semaglutide|liraglutide|tirzepatide/.test(text)) entities.push("GLP-1 peptides");
      if (/growth hormone releasing|ghrp|cjc[-\s]?1295|ipamorelin|tesamorelin|ghrelin|secretagogue/.test(text)) {
        entities.push("growth hormone peptides");
      }
      if (/\bpeptide\b|\bpeptides\b/.test(text)) entities.push("peptides");

      return normalizeCompactList(entities, 8, 60);
    }

    function buildLastUserIntent(question, mode, topic) {
      const prompt = normalizeCompactText(question, 150);
      if (!prompt) {
        return "";
      }

      if (mode === "comparison") {
        return `asking for a comparison related to ${topic || "the current topic"}`;
      }
      if (mode === "confirmation") {
        return "confirming the immediately previous assistant offer";
      }
      if (mode === "personalization") {
        return `asking how ${topic || "the current topic"} applies in a specific context`;
      }
      if (mode === "action_plan") {
        return `asking what to do next about ${topic || "the current topic"}`;
      }

      return `asking about ${prompt}`;
    }

    function buildThreadSummary(state) {
      const parts = [];

      if (state.primary_topic) {
        parts.push(`This thread is about ${state.primary_topic}`);
      }
      if (state.goal_context) {
        parts.push(`with a ${state.goal_context.replace(/_/g, " ")} goal`);
      }
      if (state.population_context.length) {
        parts.push(`focused on ${state.population_context.join(", ")}`);
      }
      if (state.comparison_target) {
        parts.push(`and comparison against ${state.comparison_target}`);
      }

      const summary = parts.join(" ");
      return summary ? `${summary}.` : "";
    }

    function deriveThreadState(threadData, question = "", answerSummary = "") {
      const previous = mergeThreadState(threadData?.threadState);
      const isAffirmation = questionLooksLikeAffirmation(question);
      const isFollowUp = questionLooksLikeFollowUp(question) && !isAffirmation;
      const primaryTopic = inferPrimaryTopic(question, previous.primary_topic);
      const comparisonTarget = extractComparisonTarget(question) || "";
      const populationContext = extractPopulationContext(question);
      const questionMode = inferQuestionMode(question);
      const nextState = mergeThreadState({
        ...previous,
        primary_topic: primaryTopic,
        secondary_topics: normalizeCompactList(
          [
            ...(isFollowUp ? previous.secondary_topics : []),
            isFollowUp && previous.goal_context
              ? previous.goal_context.replace(/_/g, " ")
              : "",
            comparisonTarget,
            ...populationContext,
          ],
          4,
          60
        ),
        goal_context: inferGoalContext(question, previous.goal_context),
        question_mode: questionMode,
        recent_entities: extractRecentEntities(question, primaryTopic, comparisonTarget),
        comparison_target:
          questionMode === "comparison" ? comparisonTarget || previous.comparison_target : "",
        population_context:
          populationContext.length > 0
            ? populationContext
            : isFollowUp
              ? previous.population_context
              : [],
        last_user_intent: buildLastUserIntent(question, questionMode, primaryTopic),
        last_answer_summary:
          normalizeCompactText(answerSummary, 220) || previous.last_answer_summary,
        updated_at: new Date().toISOString(),
      });

      nextState.thread_summary = buildThreadSummary(nextState);
      return nextState;
    }

    function buildRecentMessages(messages, maxItems = 6) {
      return (Array.isArray(messages) ? messages : [])
        .slice(-maxItems)
        .map((message) => ({
          role: normalizeCompactText(message?.role, 24),
          text: normalizeCompactText(message?.plainText || message?.text || "", 320),
        }))
        .filter((message) => message.role && message.text);
    }

    function renderWelcomeState() {
      thread.classList.add("is-empty");
      thread.innerHTML = `
        <section class="thread-welcome">
          <p class="thread-welcome-eyebrow">Emersus</p>
          <h2 class="thread-welcome-title">Welcome, ${escapeHtml(getDisplayName())}</h2>
          <p class="thread-welcome-copy">Ask about training, nutrition, supplements, recovery, cardiovascular fitness, or metabolic health and I&apos;ll keep the answer evidence-aware.</p>
        </section>
      `;
    }

    function clearWelcomeState() {
      thread.classList.remove("is-empty");
      if (thread.querySelector(".thread-welcome")) {
        thread.innerHTML = "";
      }
    }

    function updateHistoryToggleButton() {
      if (!historyToggleButton) {
        return;
      }

      const hidden = appShell.classList.contains("history-hidden");
      historyToggleButton.setAttribute("aria-expanded", String(!hidden));
      historyToggleButton.setAttribute("aria-label", hidden ? "Show conversation history" : "Hide conversation history");
      historyToggleButton.querySelector(".material-symbols-outlined").textContent = hidden ? "left_panel_open" : "left_panel_close";
    }

    function formatHistoryTime(isoString) {
      if (!isoString) {
        return "";
      }

      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) {
        return "";
      }

      return date.toLocaleDateString(undefined, {
        month: "short",
        day: "numeric",
      });
    }

    function deriveThreadTitle(threadData) {
      const firstUserMessage = (threadData?.messages || []).find((message) => message.role === "user");
      const source = String(firstUserMessage?.text || "").replace(/\s+/g, " ").trim();
      if (!source) {
        return "New chat";
      }

      return source.length > 42 ? `${source.slice(0, 41).trim()}...` : source;
    }

    function deriveThreadPreview(threadData) {
      const latestAssistant = [...(threadData?.messages || [])].reverse().find((message) => message.role === "assistant");
      const fallback = (threadData?.messages || []).find((message) => message.role === "user");
      const source = String(latestAssistant?.plainText || latestAssistant?.text || fallback?.text || "").replace(/\s+/g, " ").trim();
      if (!source) {
        return "No messages yet";
      }

      return source.length > 52 ? `${source.slice(0, 51).trim()}...` : source;
    }

    async function loadHistoryFromSupabase() {
      if (!session?.user?.id) {
        return [];
      }

      const rows = await listChatThreads(session.user.id);
      return rows.map((row) => ({
        id: row.id,
        title: row.title || "New chat",
        preview: row.preview || "No messages yet",
        createdAt: row.created_at,
        updatedAt: row.updated_at,
        messages: Array.isArray(row.messages) ? row.messages : [],
        sources: Array.isArray(row.sources) ? row.sources : [],
        rail: row.rail && typeof row.rail === "object" ? row.rail : {},
        threadState: mergeThreadState(row.thread_state),
      }));
    }

    function getActiveThread() {
      return chatHistory.find((threadData) => threadData.id === activeThreadId) || null;
    }

    function ensureActiveThread() {
      let threadData = getActiveThread();
      if (threadData) {
        return threadData;
      }

      threadData = {
        id: createThreadId(),
        title: "New chat",
        preview: "No messages yet",
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        messages: [],
        sources: [],
        rail: {},
        threadState: createEmptyThreadState(),
      };

      activeThreadId = threadData.id;
      chatHistory.unshift(threadData);
      return threadData;
    }

    async function persistActiveThread() {
      const threadData = getActiveThread();
      if (!threadData) {
        return;
      }

      threadData.title = deriveThreadTitle(threadData);
      threadData.preview = deriveThreadPreview(threadData);
      threadData.updatedAt = new Date().toISOString();
      chatHistory = chatHistory
        .filter((item) => item.id !== threadData.id)
        .sort((left, right) => new Date(right.updatedAt || 0) - new Date(left.updatedAt || 0));
      chatHistory.unshift(threadData);
      chatHistory = chatHistory.slice(0, MAX_HISTORY_ITEMS);
      if (session?.user?.id) {
        const saved = await upsertChatThread(session.user.id, threadData);
        threadData.createdAt = saved.created_at;
        threadData.updatedAt = saved.updated_at;
        threadData.threadState = mergeThreadState(saved.thread_state);
      }
      renderHistory();
    }

    function renderHistory() {
      historyList.innerHTML = "";

      if (!chatHistory.length) {
        return;
      }

      chatHistory
        .sort((left, right) => new Date(right.updatedAt || 0) - new Date(left.updatedAt || 0))
        .forEach((threadData) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `chat-nav-link${threadData.id === activeThreadId ? " is-active" : ""}`;
          button.dataset.threadId = threadData.id;
          button.innerHTML = `
            <span class="material-symbols-outlined">history</span>
            <span>
              <span class="chat-nav-label">${escapeHtml(threadData.title || "New chat")}</span>
              <span class="chat-nav-meta">${escapeHtml(`${formatHistoryTime(threadData.updatedAt)} · ${threadData.preview || "No messages yet"}`)}</span>
            </span>
          `;
          historyList.appendChild(button);
        });
    }

    function isInsightCardPopulated(card) {
      const type = String(card?.type || "").toLowerCase();
      const hasText = (value) => typeof value === "string" && value.trim().length > 0;
      const nonEmptyArray = (value) => Array.isArray(value) && value.some((item) => {
        if (!item) return false;
        if (typeof item === "string") return item.trim().length > 0;
        if (typeof item === "object") {
          return Object.values(item).some((v) => (typeof v === "string" ? v.trim().length > 0 : v != null && v !== ""));
        }
        return false;
      });
      if (type === "metric_grid") {
        return nonEmptyArray(card?.metrics);
      }
      if (type === "action_grid") {
        return Array.isArray(card?.columns) && card.columns.some((col) => nonEmptyArray(col?.items));
      }
      if (type === "watchouts") {
        return nonEmptyArray(card?.items);
      }
      if (type === "source_highlights") {
        return nonEmptyArray(card?.items);
      }
      // Unknown types: only keep if they have *some* content to render.
      return hasText(card?.title) || hasText(card?.body) || nonEmptyArray(card?.items) || nonEmptyArray(card?.metrics);
    }

    function buildAssistantBlocks(data) {
      const blocks = [
        {
          type: "text",
          text: data.answer_text || data.summary || "",
        },
      ];

      const assistantCards = Array.isArray(data.cards) ? data.cards : [];
      assistantCards.forEach((card) => {
        if (!card || typeof card !== "object") {
          return;
        }
        if (!isInsightCardPopulated(card)) {
          return;
        }
        blocks.push({
          type: "tool_result",
          tool: "insight_card",
          data: card,
        });
      });

      return blocks;
    }

    function renderSources(data) {
      sources.innerHTML = "";
      (data.sources || []).forEach((source) => {
        const item = document.createElement("li");
        item.className = "source-item";
        const meta = [
          source.author_label || "",
          source.journal || "",
          source.year || source.published_at || "",
          source.publication_type || "",
          source.pmid ? `PMID ${source.pmid}` : "",
        ]
          .filter(Boolean)
          .join(" - ");
        const snippet = trimSnippet(source.excerpt || source.why_it_matters || "");
        const links = [];
        if (source.doi && source.url) {
          links.push(`<a href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">DOI</a>`);
        } else if (source.url) {
          links.push(`<a href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">Open source</a>`);
        }

        if (source.pmid) {
          const pubmedUrl = `https://pubmed.ncbi.nlm.nih.gov/${encodeURIComponent(source.pmid)}/`;
          links.push(`<a href="${pubmedUrl}" target="_blank" rel="noreferrer">PubMed</a>`);
        }

        item.innerHTML = `
          <strong>${escapeHtml(source.title || "Source")}</strong>
          ${meta ? `<div class="source-meta">${escapeHtml(meta)}</div>` : ""}
          ${snippet ? `<div class="source-snippet">${escapeHtml(snippet)}</div>` : ""}
          ${links.length ? `<div class="source-links">${links.join("")}</div>` : ""}
        `;
        sources.appendChild(item);
      });
    }

    async function updateRail(data = {}) {
      const confidenceScore = Number(data.confidence?.score || 0);
      const confidenceLabel = String(data.confidence?.label || "idle");
      const sourceCount = Array.isArray(data.sources) ? data.sources.length : 0;
      const synthesisMode = data.debug?.synthesis_mode || (data.summary ? "synthesized" : "idle");
      const confidencePercent = Math.round(Math.max(0, Math.min(confidenceScore, 1)) * 100);

      railConfidence.textContent = `${confidencePercent}%`;
      railConfidenceLabel.textContent = confidenceLabel;
      railConfidenceBar.style.setProperty("--spark-width", `${Math.max(0, Math.min(confidenceScore * 100, 100))}%`);

      railSources.textContent = String(sourceCount);
      railSourcesBar.style.setProperty("--spark-width", `${Math.max(10, Math.min(sourceCount * 16, 100))}%`);

      railMode.textContent = synthesisMode.replace(/[:_]/g, " ");
      railModeBar.style.setProperty("--spark-width", `${data.summary ? 88 : 68}%`);

      const threadData = getActiveThread();
      if (threadData) {
        threadData.rail = {
          confidenceScore,
          confidencePercent,
          confidenceLabel,
          sourceCount,
          synthesisMode,
        };
        threadData.sources = Array.isArray(data.sources) ? data.sources : [];
        await persistActiveThread();
      }
    }

    function hydrateRailFromThread(threadData) {
      const rail = threadData?.rail || {};
      const confidencePercent =
        typeof rail.confidencePercent === "number"
          ? rail.confidencePercent
          : Math.round(Math.max(0, Math.min(Number(rail.confidenceScore || 0), 1)) * 100);
      railConfidence.textContent = `${confidencePercent}%`;
      railConfidenceLabel.textContent = rail.confidenceLabel || "idle";
      railConfidenceBar.style.setProperty("--spark-width", `${Math.max(0, Math.min(Number(rail.confidenceScore || 0) * 100, 100))}%`);
      railSources.textContent = String(rail.sourceCount || 0);
      railSourcesBar.style.setProperty("--spark-width", `${Math.max(10, Math.min(Number(rail.sourceCount || 0) * 16, 100))}%`);
      railMode.textContent = String(rail.synthesisMode || "idle").replace(/[:_]/g, " ");
      railModeBar.style.setProperty("--spark-width", `${rail.synthesisMode ? 88 : 68}%`);
    }

    function loadThread(threadId) {
      const threadData = chatHistory.find((item) => item.id === threadId);
      if (!threadData) {
        return;
      }

      activeThreadId = threadData.id;
      thread.innerHTML = "";
      if ((threadData.messages || []).length) {
        clearWelcomeState();
        (threadData.messages || []).forEach((message) => {
          const article = document.createElement("article");
          article.className = `message ${message.role}`;
          article.innerHTML = `<div class="message-content">${message.html || ""}</div>`;
          thread.appendChild(article);
        });
      } else {
        renderWelcomeState();
      }

      renderSources({ sources: threadData.sources || [] });
      hydrateRailFromThread(threadData);
      renderHistory();
      scrollThreadToBottom();
    }

    function startNewChat() {
      activeThreadId = createThreadId();
      const threadData = ensureActiveThread();
      renderWelcomeState();
      sources.innerHTML = "";
      threadData.threadState = createEmptyThreadState();
      hydrateRailFromThread(threadData);
      renderHistory();
      return threadData;
    }

    async function submitQuestion(question) {
      const trimmed = String(question || "").trim();
      if (!trimmed) {
        setStatus(status, "error", "Type a question first.");
        return;
      }

      submitButton.disabled = true;
      setStatus(status, "", "");

      const threadData = ensureActiveThread();
      await appendMessage("user", escapeHtml(trimmed), "Now", {
        text: trimmed,
        plainText: trimmed,
      });
      threadData.threadState = deriveThreadState(threadData, trimmed, "");
      await persistActiveThread();
      railMode.textContent = "thinking";

      try {
        const response = await fetch("/api/emersus/recommendation", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            question: trimmed,
            userId: session?.user?.id ? `supabase:${session.user.id}` : "",
            threadState: threadData.threadState,
            recentMessages: buildRecentMessages(threadData.messages),
            includeDebug: true,
          }),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.message || "Unable to generate a recommendation.");
        }

        await appendMessage("assistant", "", "Now", {
          blocks: buildAssistantBlocks(data),
          animate: true,
          plainText: data.answer_text || data.summary || "",
          text: data.answer_text || data.summary || "",
        });
        threadData.threadState = deriveThreadState(
          threadData,
          trimmed,
          data.summary || data.answer_text || ""
        );
        renderSources(data);
        await updateRail(data);
        setStatus(status, "", "");
        form.reset();
      } catch (error) {
        await appendMessage("assistant", `<p>${escapeHtml(error.message || "Request failed.")}</p>`, "Error", {
          animate: true,
          plainText: error.message || "Request failed.",
          text: error.message || "Request failed.",
        });
        threadData.threadState = deriveThreadState(
          threadData,
          trimmed,
          error.message || "Request failed."
        );
        await persistActiveThread();
        setStatus(status, "error", error.message || "Request failed.");
        railMode.textContent = "error";
      } finally {
        submitButton.disabled = false;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      await submitQuestion(formData.get("question"));
    });

    questionInput?.addEventListener("keydown", async (event) => {
      if (event.key !== "Enter" || event.shiftKey) {
        return;
      }

      event.preventDefault();
      if (submitButton.disabled) {
        return;
      }

      await submitQuestion(questionInput.value);
    });

    newChatButton.addEventListener("click", () => {
      startNewChat();
      setStatus(status, "", "");
      questionInput?.focus();
    });

    historyToggleButton.addEventListener("click", () => {
      appShell.classList.toggle("history-hidden");
      updateHistoryToggleButton();
    });

    historyList.addEventListener("click", (event) => {
      const target = event.target.closest("[data-thread-id]");
      if (!target) {
        return;
      }

      loadThread(target.dataset.threadId);
    });

    session = await requireAuth();
    if (!session) {
      throw new Error("Authentication required.");
    }

    updateHistoryToggleButton();

    chatHistory = await loadHistoryFromSupabase();
    if (chatHistory.length) {
      activeThreadId = chatHistory[0].id;
      renderHistory();
      loadThread(activeThreadId);
    } else {
      startNewChat();
      await updateRail({});
      renderHistory();
      await persistActiveThread();
    }
  </script>
</body>
</html>
