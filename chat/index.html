<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=/app/">
  <title>Redirecting to /app/ — Emersus AI</title>
  <link rel="canonical" href="https://emersus.ai/app/">
  <script>
    // /chat/ → /app/  (the chat is now the default home per the 2026-04-15
    // redesign spec). Preserves any query string and hash so deep links keep
    // working: /chat/?prompt=... → /app/?prompt=...
    (function () {
      var qs = window.location.search || "";
      var hash = window.location.hash || "";
      window.location.replace("/app/" + qs + hash);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/app/">/app/</a>…</p>
</body>
</html>
