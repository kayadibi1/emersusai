<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
    <!-- no-cache-legacy: defeat browser cache on redirect page -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0e1117">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Swim Session | Emersus AI</title>
  <!-- no-flash-boot: resolves data-theme pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        // Default to Graphite·Jade (mint, dark) for new visitors. Existing
        // users keep whatever they've saved. System prefers-color-scheme is
        // ignored by design; users switch in Settings.
        var theme = (saved === 'mint' || saved === 'paper') ? saved : 'mint';
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      // Auth pre-paint gate for /app/**. Without this, an unauthenticated
      // visitor clicking "Chat" sees the full chat UI flash for ~300 ms
      // (React mounts before the async requireAuth() -> config fetch chain
      // finishes). Probe for any sb-*-auth-token key in localStorage; if
      // absent, redirect to /auth/login/ synchronously with a next= param.
      // A stale token still hits the async redirect from requireAuth()
      // later — but the cold-visitor path no longer flashes.
      try {
        if (location.pathname.indexOf('/app/') === 0) {
          var hasSession = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('sb-') === 0 && k.indexOf('auth-token') >= 0) {
              hasSession = true; break;
            }
          }
          if (!hasSession) {
            var returnTo = location.pathname + location.search;
            location.replace('/auth/login/?next=' + encodeURIComponent(returnTo));
          }
        }
      } catch (_) { /* localStorage disabled; async requireAuth will handle */ }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css">
  <link rel="stylesheet" href="/shared/chrome.css">
  <script type="module">
    import { bootTheme } from '/shared/theme.js';
    bootTheme();
    window.location.replace('/app/train/?modality=swim' + window.location.search.replace(/^\?/, '&'));
  </script>
  <link rel="stylesheet" href="/shared/site.css">
  <style>
    body { background: var(--bg); color: var(--ink); font-family: system-ui, -apple-system, sans-serif; }
    .swim-wrap { max-width: 480px; margin: 0 auto; padding: 24px 18px 140px; min-height: 100vh; display: flex; flex-direction: column; }
    .swim-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; font-size: 0.78rem; color: var(--muted); }
    .swim-topbar a { color: var(--accent); text-decoration: none; }
    .title-field { background: rgba(255,255,255,0.04); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; }
    .title-field .label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .title-field input { background: transparent; border: none; color: var(--ink); font-size: 1.08rem; font-weight: 700; width: 100%; padding: 4px 0 0; outline: none; }
    .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .chip { padding: 8px 14px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; border: 1px solid var(--line); background: rgba(255,255,255,0.03); color: var(--muted); cursor: pointer; }
    .chip.active { background: rgba(159,251,0,0.14); border-color: rgba(159,251,0,0.38); color: var(--accent); }
    .prescribed { background: rgba(109,159,255,0.07); border: 1px solid rgba(109,159,255,0.18); border-radius: 8px; padding: 12px 14px; margin-bottom: 18px; }
    .prescribed .label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
    .prescribed .target { font-size: 0.92rem; font-weight: 600; margin-top: 4px; color: var(--ink); }
    .big-btn { background: #78dc14; color: #08080a; font-weight: 800; font-size: 0.84rem; text-transform: uppercase; letter-spacing: 0.15em; padding: 18px; border-radius: 4px; border: none; margin-top: auto; cursor: pointer; width: 100%; }
    .secondary-btn { background: rgba(255,255,255,0.04); color: var(--ink); font-weight: 700; font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 14px; border-radius: 4px; border: 1px solid var(--line); cursor: pointer; flex: 1; }
    .danger-btn { background: rgba(255,143,157,0.1); color: var(--danger); font-weight: 700; font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 14px; border-radius: 4px; border: 1px solid rgba(255,143,157,0.3); cursor: pointer; flex: 1; }
    .lap-big { text-align: center; font-size: 5rem; font-weight: 900; color: var(--accent); letter-spacing: -0.05em; line-height: 1; margin: 14px 0 4px; font-variant-numeric: tabular-nums; }
    .lap-label { text-align: center; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .lap-tap-btn { background: linear-gradient(135deg, rgba(109,159,255,0.3), rgba(159,251,0,0.2)); border: 2px solid rgba(159,251,0,0.4); border-radius: 22px; padding: 34px; color: var(--ink); font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; margin: 14px 0; cursor: pointer; }
    .lap-undo { text-align: center; font-size: 0.76rem; color: var(--accent); margin-top: 6px; background: none; border: none; cursor: pointer; }
    .stat-row-swim { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: auto; }
    .live-stat { background: rgba(255,255,255,0.03); border: 1px solid var(--line); border-radius: 8px; padding: 12px 8px; text-align: center; }
    .live-stat-val { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; color: var(--ink); }
    .live-stat-label { font-size: 0.56rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
    .swim-btn-row { margin-top: 14px; display: flex; gap: 10px; }
    .swim-topbar-live { font-size: 0.74rem; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="swim-wrap" id="swim-root"></div>
  <script type="module" src="/app/workout/swim/swim.js"></script>
</body>
</html>
