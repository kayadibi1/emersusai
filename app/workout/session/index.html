<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Session | Emersus AI</title>
    <!-- no-flash-boot: resolves data-theme + v2 flags pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        var theme = (saved === 'mint' || saved === 'paper') ? saved
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'paper' : 'mint');
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      try {
        var url = new URLSearchParams(location.search);
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('emersus-flags') || '{}') || {}; } catch (_) {}
        var FLAGS = ['chat_v2','train_v2','nutrition_v2','profile_v2','progress_v2','auth_v2','public_v2','conversational_onboarding'];
        FLAGS.forEach(function (flag) {
          var raw = url.get(flag);
          var val = (raw === '0' || raw === 'false') ? false
            : (raw === '1' || raw === 'true') ? true
            : (typeof stored[flag] === 'boolean') ? stored[flag]
            : true;
          if (val) H.setAttribute('data-' + flag.replace(/_/g, '-'), '1');
        });
      } catch (_) {
        ['chat-v2','train-v2','nutrition-v2','profile-v2','progress-v2','auth-v2','public-v2','conversational-onboarding'].forEach(function (f) {
          H.setAttribute('data-' + f, '1');
        });
      }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css?v=redesign-1">
  <link rel="stylesheet" href="/shared/chrome.css?v=redesign-1">
  <script type="module">
    import { bootTheme } from '/shared/theme.js?v=redesign-1';
    import { resolveFlag } from '/shared/feature-flags.js?v=redesign-9';
    bootTheme();
    if (resolveFlag('train_v2')) {
      // Pull the session id from the legacy URL if present.
      const params = new URLSearchParams(window.location.search);
      const sid = params.get('id') || params.get('session');
      const target = '/app/train/' + (sid ? `?modality=lift&session=${encodeURIComponent(sid)}` : '');
      window.location.replace(target);
    }
  </script>
  <link rel="stylesheet" href="/shared/site.css?v=redesign-20260412">
  <style>
    /* Phase 1.5 mobile-first session view. Designed for ~375px portrait
       phones with one-handed gym use. Big tap targets, sticky timer,
       single exercise focus. All tokens come from shared/site.css. */

    body.session-page {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
    }

    .session-shell {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 16px 120px;
      min-height: 100vh;
      min-height: 100svh;
      box-sizing: border-box;
    }

    /* Top bar */
    .session-topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 0 12px;
      background: linear-gradient(180deg, var(--bg) 70%, rgba(12, 14, 17, 0));
    }
    .session-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
    }
    .session-back:hover { border-color: rgba(159, 251, 0, 0.38); }

    .session-progress {
      flex: 1;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: right;
    }

    /* Crumb header */
    .session-crumb {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 8px 0 6px;
    }
    .session-title {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
      color: var(--ink);
    }
    .session-summary {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 18px;
    }

    /* Phase header band */
    .phase-band {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      background: rgba(108, 159, 255, 0.12);
      color: var(--accent);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 18px;
    }
    .phase-band.warmup {
      background: rgba(240, 179, 74, 0.14);
      color: #f0b34a;
    }

    /* Block card */
    .block-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px 20px 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .block-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 6px;
      color: var(--ink);
    }
    .block-prescription {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .block-meta {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }
    .block-notes {
      font-size: 12px;
      color: var(--ink);
      background: var(--surface-soft);
      border-left: 2px solid var(--accent);
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
    }

    /* Set logging row */
    .set-row {
      display: grid;
      grid-template-columns: 36px 1fr 1fr 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }
    .set-row:first-of-type { border-top: 0; }
    .set-row .set-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .set-row input {
      width: 100%;
      padding: 10px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      font-variant-numeric: tabular-nums;
      box-sizing: border-box;
    }
    .set-row input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(159, 251, 0, 0.06);
    }
    .set-row input::placeholder {
      color: var(--muted);
      opacity: 0.55;
    }
    .set-row .set-done {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    .set-row .set-done.is-done {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .set-row .set-done:hover { border-color: rgba(159, 251, 0, 0.38); }

    .set-headers {
      display: grid;
      grid-template-columns: 36px 1fr 1fr 1fr auto;
      gap: 8px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
      padding: 0 0 4px;
    }
    .set-headers span:first-child { visibility: hidden; }
    .set-headers .header-done { visibility: hidden; min-width: 52px; }

    /* Per-set notes input — collapsed by default, expand on tap */
    .set-notes-toggle {
      background: none;
      border: 0;
      color: var(--accent);
      font-size: 11px;
      padding: 6px 0 0;
      cursor: pointer;
    }
    .set-notes {
      width: 100%;
      margin-top: 6px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 12px;
      font-family: inherit;
      box-sizing: border-box;
      resize: vertical;
      min-height: 50px;
    }

    /* Block navigation buttons */
    .block-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 20px 0 16px;
    }
    .block-nav button {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .block-nav button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .block-nav button.primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .block-nav button.primary:hover { background: #c8ff4a; }

    /* Session-level finish button */
    .finish-row {
      margin-top: 18px;
    }
    .finish-row button {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--accent);
      border-radius: 12px;
      background: var(--accent);
      color: var(--bg);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
    }
    .finish-share-btn {
      background: #78dc14;
      color: var(--bg);
      font-weight: 800;
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 14px;
      border-radius: 4px;
      border: none;
      margin-top: 8px;
      cursor: pointer;
      width: 100%;
    }

    /* Session notes textarea */
    .session-notes {
      margin-top: 18px;
    }
    .session-notes label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .session-notes textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 13px;
      font-family: inherit;
      box-sizing: border-box;
      resize: vertical;
      min-height: 70px;
    }

    /* Floating rest timer pill */
    .rest-timer {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 22px 14px 26px;
      background: var(--accent);
      color: var(--bg);
      border-radius: 999px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5);
      z-index: 50;
      cursor: pointer;
      max-width: calc(100% - 32px);
    }
    .rest-timer .rest-mmss {
      font-size: 22px;
      letter-spacing: -0.01em;
    }
    .rest-timer .rest-skip {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding: 6px 12px;
      border: 1px solid #0c0e11;
      border-radius: 4px;
      background: transparent;
    }
    .rest-timer.is-done {
      background: var(--danger);
      color: var(--bg);
      animation: rest-pulse 1.2s ease-in-out infinite;
    }
    @keyframes rest-pulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.04); }
    }

    /* Toast / status */
    .session-toast {
      position: fixed;
      left: 50%;
      bottom: 96px;
      transform: translateX(-50%);
      padding: 10px 16px;
      background: var(--surface-strong);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 4px;
      font-size: 12px;
      z-index: 40;
      max-width: calc(100% - 32px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 200ms ease;
    }
    .session-toast.is-visible { opacity: 1; }
    .session-toast.is-error { color: var(--danger); border-color: rgba(255, 143, 157, 0.4); }

    /* Empty / loading state */
    .session-empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    .session-empty a {
      color: var(--accent);
      text-decoration: underline;
    }

    @media (min-width: 720px) {
      .session-shell { padding: 0 24px 140px; }
      .session-title { font-size: 32px; }
    }
  </style>
</head>
<body class="session-page">
  <div id="session-root" class="session-shell">
    <div class="session-empty">Loading session...</div>
  </div>
  <script type="module" src="/app/workout/session/session.js"></script>
</body>
</html>
