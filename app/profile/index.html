<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile | Emersus AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/site.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container site-header-inner">
        <a class="brand-mark" href="/">Emersus AI</a>
        <nav class="site-nav">
          <a href="/app/">Dashboard</a>
          <a href="/app/profile/">Profile</a>
          <a href="/app/progress/">Progress</a>
          <a href="/chat/">Chat</a>
          <a href="/privacy/">Privacy</a>
          <a href="/contact/">Contact</a>
          <button class="button button-ghost" type="button" data-auth-logout>Log Out</button>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="container stack">
        <section class="hero-panel stack">
          <p class="section-kicker">Profile</p>
          <h1>Your profile</h1>
          <p class="lede">
            This is what Emersus knows about you. To update anything, just mention it in the <a href="/chat/">chat</a>.
          </p>
          <!-- Hidden until shared/app-pages.js has painted the real email
               (cache or session) — avoids "Signed in as Loading..." flash. -->
          <div class="chip" data-reveal-on-hydrate hidden>Signed in as <span data-user-email></span></div>
        </section>

        <section class="form-panel stack">
          <form class="form-grid" data-profile-form>
            <input type="hidden" name="email">
            <div class="form-grid two-up">
              <label class="field">
                <span class="field-label">Full Name</span>
                <input type="text" name="full_name" disabled>
              </label>
              <label class="field">
                <span class="field-label">Experience Level</span>
                <input type="text" name="experience_level" disabled>
              </label>
            </div>
            <label class="field">
              <span class="field-label">Primary Use Case</span>
              <input type="text" name="primary_use_case" disabled>
            </label>
            <label class="field">
              <span class="field-label">Primary Goal</span>
              <input type="text" name="goal" disabled>
            </label>
            <div class="form-grid two-up">
              <label class="field">
                <span class="field-label">Equipment Access</span>
                <input type="text" name="equipment_access" disabled>
              </label>
              <label class="field">
                <span class="field-label">Training Schedule</span>
                <input type="text" name="training_schedule" disabled>
              </label>
            </div>
            <label class="field">
              <span class="field-label">Dietary Preferences</span>
              <textarea name="dietary_preferences" disabled></textarea>
            </label>
            <label class="field">
              <span class="field-label">Injuries / Limitations</span>
              <textarea name="injuries_limitations" disabled></textarea>
            </label>
            <label class="field">
              <span class="field-label">Sleep / Stress Context</span>
              <textarea name="sleep_stress_context" disabled></textarea>
            </label>
            <label class="field">
              <span class="field-label">Weight Unit (editable)</span>
              <select name="weight_unit" data-weight-unit-select>
                <option value="kg">Kilograms (kg)</option>
                <option value="lbs">Pounds (lbs)</option>
              </select>
            </label>
            <div class="sharing-section" style="margin-top:24px; padding-top:20px; border-top:1px solid var(--line);">
              <h3 style="font-size:0.78rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;">Sharing &amp; Tracking</h3>

              <label class="field">
                <span class="field-label">Display name on share cards</span>
                <input type="text" name="display_name_public" placeholder="(leave blank for anonymous)">
              </label>

              <label class="field">
                <span class="field-label">Path privacy radius</span>
                <select name="mapbox_privacy_radius_m">
                  <option value="0">Show full path</option>
                  <option value="50">50 m</option>
                  <option value="100" selected>100 m (recommended)</option>
                  <option value="200">200 m</option>
                  <option value="500">500 m</option>
                </select>
              </label>

              <label class="field">
                <span class="field-label">Default pool length</span>
                <select name="default_pool_length_m">
                  <option value="">—</option>
                  <option value="25">25 m</option>
                  <option value="50">50 m</option>
                  <option value="22.86">25 yd</option>
                  <option value="30.48">33⅓ yd</option>
                </select>
              </label>

              <label class="field">
                <span class="field-label">Default grade system</span>
                <select name="default_grade_system">
                  <option value="">—</option>
                  <option value="V">V-scale (bouldering)</option>
                  <option value="YDS">YDS (sport)</option>
                  <option value="Font">Fontainebleau</option>
                  <option value="French">French</option>
                </select>
              </label>

              <label class="field">
                <span class="field-label">Distance unit</span>
                <select name="distance_unit">
                  <option value="km">Kilometers (km)</option>
                  <option value="mi">Miles (mi)</option>
                </select>
              </label>
            </div>

            <div class="button-row">
              <a class="button button-primary" href="/chat/">Update via Chat</a>
              <a class="button button-secondary" href="/app/">Back to Dashboard</a>
            </div>
            <p class="status-text" data-profile-status></p>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="/shared/app-pages.js"></script>
</body>
</html>
