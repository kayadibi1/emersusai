<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0e1117">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Library | Emersus AI</title>
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        var theme = (saved === 'mint' || saved === 'paper') ? saved : 'mint';
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      try {
        if (location.pathname.indexOf('/app/') === 0) {
          var hasSession = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('sb-') === 0 && k.indexOf('auth-token') >= 0) {
              hasSession = true; break;
            }
          }
          if (!hasSession) {
            var returnTo = location.pathname + location.search;
            location.replace('/auth/login/?next=' + encodeURIComponent(returnTo));
          }
        }
      } catch (_) { /* localStorage disabled; async requireAuth will handle */ }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css">
  <link rel="stylesheet" href="/shared/chrome.css">
  <link rel="stylesheet" href="/shared/skeleton.css">
  <link rel="stylesheet" href="/shared/library.css">
  <script type="module">
    import { bootTheme } from '/shared/theme.js';
    bootTheme();
  </script>
</head>
<body class="library-body app-body">
  <aside class="app-sidebar" aria-label="App navigation">
    <div class="app-sidebar-head">
      <a class="app-sidebar-brand" href="/">em<b>∴</b>rsus</a>
    </div>
    <nav class="app-sidebar-sections">
      <div class="app-sidebar-sections-label">Sections</div>
      <a class="app-sidebar-section" data-section="chat" href="/app/"><span class="app-sidebar-section-dot"></span>Chat</a>
      <a class="app-sidebar-section" data-section="train" href="/app/train/"><span class="app-sidebar-section-dot"></span>Train</a>
      <a class="app-sidebar-section" data-section="nutrition" href="/app/nutrition/"><span class="app-sidebar-section-dot"></span>Nutrition</a>
      <a class="app-sidebar-section" data-section="progress" href="/app/progress/"><span class="app-sidebar-section-dot"></span>Progress</a>
      <a class="app-sidebar-section" data-section="library" href="/app/library/"><span class="app-sidebar-section-dot"></span>Library</a>
      <a class="app-sidebar-section" data-section="profile" href="/app/profile/"><span class="app-sidebar-section-dot"></span>Profile</a>
    </nav>
    <script>
      (function () {
        var p = location.pathname;
        var key = /^\/app\/train/.test(p) ? 'train'
          : /^\/app\/nutrition/.test(p) ? 'nutrition'
          : /^\/app\/progress/.test(p) ? 'progress'
          : /^\/app\/library/.test(p) ? 'library'
          : /^\/app\/profile/.test(p) ? 'profile'
          : 'chat';
        var host = document.currentScript.parentElement;
        var el = host.querySelector('[data-section="' + key + '"]');
        if (el) el.classList.add('is-active');
      })();
    </script>
  </aside>
  <div id="library-root"></div>
  <script type="module" src="/app/library/library.js"></script>
</body>
</html>
