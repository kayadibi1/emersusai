<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
    <!-- no-cache-legacy: defeat browser cache on redirect page -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Exercise Detail | Emersus AI</title>
    <!-- no-flash-boot: resolves data-theme + v2 flags pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        var theme = (saved === 'mint' || saved === 'paper') ? saved
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'paper' : 'mint');
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      try {
        var url = new URLSearchParams(location.search);
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('emersus-flags') || '{}') || {}; } catch (_) {}
        var FLAGS = ['chat_v2','train_v2','nutrition_v2','profile_v2','progress_v2','auth_v2','public_v2','conversational_onboarding'];
        FLAGS.forEach(function (flag) {
          var raw = url.get(flag);
          var val = (raw === '0' || raw === 'false') ? false
            : (raw === '1' || raw === 'true') ? true
            : (typeof stored[flag] === 'boolean') ? stored[flag]
            : true;
          if (val) H.setAttribute('data-' + flag.replace(/_/g, '-'), '1');
        });
      } catch (_) {
        ['chat-v2','train-v2','nutrition-v2','profile-v2','progress-v2','auth-v2','public-v2','conversational-onboarding'].forEach(function (f) {
          H.setAttribute('data-' + f, '1');
        });
      }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css?v=redesign-1">
  <link rel="stylesheet" href="/shared/chrome.css?v=redesign-1">
  <script type="module">
    import { bootTheme } from '/shared/theme.js?v=redesign-1';
    import { resolveFlag } from '/shared/feature-flags.js?v=redesign-9';
    bootTheme();
    if (resolveFlag('progress_v2')) {
      window.location.replace('/app/progress/?drill=exercise' + window.location.search.replace(/^\?/, '&'));
    }
  </script>
  <style>
    /* Exercise detail — drill-down view. All tokens from shared/site.css. */

    body.exercise-page {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
    }

    .exercise-shell {
      max-width: 520px;
      margin: 0 auto;
      padding: 32px 24px 80px;
      box-sizing: border-box;
    }

    .progress-loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Back link */
    .back {
      font-size: 0.78rem;
      color: var(--accent);
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 16px;
      display: inline-block;
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }

    /* Exercise header */
    .exercise-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    /* Icon type (inline SVG container) */
    .icon-type {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon-type svg { width: 18px; height: 18px; }

    /* Page title */
    .page-title {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .exercise-subtitle {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .page-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Mini stat row */
    .stat-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .mini-stat {
      flex: 1;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
    }
    .mini-stat-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .mini-stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .mini-stat-sub {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Chart area */
    .chart-area {
      height: 140px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .chart-area svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Section label */
    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* Glass card */
    .card {
      background: linear-gradient(180deg, rgba(12, 14, 17, 0.92), rgba(9, 11, 14, 0.88));
      backdrop-filter: blur(28px);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 1.25rem;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .card-title {
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin-bottom: 14px;
    }

    /* Set table */
    .set-table { width: 100%; border-collapse: collapse; }
    .set-table th {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 0 0 8px 0;
      border-bottom: 1px solid var(--line);
    }
    .set-table th:not(:first-child) { text-align: right; }
    .set-table td {
      font-size: 0.8rem;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
    }
    .set-table td:not(:first-child) { text-align: right; }
    .set-table td.muted { color: var(--muted); }
    .set-table tr:last-child td { border-bottom: none; }
    .pr-flag {
      color: #FFD700;
      font-weight: 600;
      font-size: 0.65rem;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <!-- redirect-only body: stripped legacy markup to avoid flash -->
  <noscript>
    <p style="padding:20px;font-family:system-ui,sans-serif;">
      This page has moved. Please <a href="/">return home</a>.
    </p>
  </noscript>
</body>
</html>
