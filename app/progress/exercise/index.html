<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Exercise Detail | Emersus AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/site.css?v=redesign-20260412">
  <style>
    /* Exercise detail — drill-down view. All tokens from shared/site.css. */

    body.exercise-page {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
    }

    .exercise-shell {
      max-width: 520px;
      margin: 0 auto;
      padding: 32px 24px 80px;
      box-sizing: border-box;
    }

    .progress-loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Back link */
    .back {
      font-size: 0.78rem;
      color: var(--accent);
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 16px;
      display: inline-block;
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }

    /* Exercise header */
    .exercise-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    /* Icon type (inline SVG container) */
    .icon-type {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon-type svg { width: 18px; height: 18px; }

    /* Page title */
    .page-title {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .exercise-subtitle {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .page-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Mini stat row */
    .stat-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .mini-stat {
      flex: 1;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
    }
    .mini-stat-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .mini-stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .mini-stat-sub {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Chart area */
    .chart-area {
      height: 140px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .chart-area svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Section label */
    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* Glass card */
    .card {
      background: linear-gradient(180deg, rgba(12, 14, 17, 0.92), rgba(9, 11, 14, 0.88));
      backdrop-filter: blur(28px);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 1.25rem;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .card-title {
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin-bottom: 14px;
    }

    /* Set table */
    .set-table { width: 100%; border-collapse: collapse; }
    .set-table th {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 0 0 8px 0;
      border-bottom: 1px solid var(--line);
    }
    .set-table th:not(:first-child) { text-align: right; }
    .set-table td {
      font-size: 0.8rem;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
    }
    .set-table td:not(:first-child) { text-align: right; }
    .set-table td.muted { color: var(--muted); }
    .set-table tr:last-child td { border-bottom: none; }
    .pr-flag {
      color: #FFD700;
      font-weight: 600;
      font-size: 0.65rem;
      margin-left: 6px;
    }
  </style>
</head>
<body class="exercise-page">
  <div class="site-shell">
    <header class="site-header">
      <div class="container site-header-inner">
        <a class="brand-mark" href="/"><img src="/emersus-logo.png" alt="Emersus"></a>
        <nav class="site-nav">
          <a href="/app/">Dashboard</a>
          <a href="/chat/">Chat</a>
          <a href="/app/workout/">Workout</a>
          <a href="/app/nutrition/">Nutrition</a>
          <a href="/app/progress/" class="active" aria-current="page">Progress</a>
          <button class="button button-ghost" type="button" data-auth-logout>Log Out</button>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div id="exercise-root" class="exercise-shell">
        <div class="progress-loading">Loading exercise...</div>
      </div>
    </main>
  </div>
  <script type="module" src="/app/progress/exercise/exercise.js"></script>
</body>
</html>
