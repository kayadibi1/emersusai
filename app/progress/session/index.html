<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
    <!-- no-cache-legacy: defeat browser cache on redirect page -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0e1117">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Session Detail | Emersus AI</title>
  <!-- no-flash-boot: resolves data-theme + v2 flags pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        // Default to Paper·Royal (light) for new visitors. Existing users keep
        // whatever they've saved. System prefers-color-scheme is ignored by
        // design — the product ships light-first; users switch in Settings.
        var theme = (saved === 'mint' || saved === 'paper') ? saved : 'paper';
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'paper'); }
      try {
        var url = new URLSearchParams(location.search);
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('emersus-flags') || '{}') || {}; } catch (_) {}
        var FLAGS = ['chat_v2','train_v2','nutrition_v2','profile_v2','progress_v2','auth_v2','public_v2','conversational_onboarding'];
        FLAGS.forEach(function (flag) {
          var raw = url.get(flag);
          var val = (raw === '0' || raw === 'false') ? false
            : (raw === '1' || raw === 'true') ? true
            : (typeof stored[flag] === 'boolean') ? stored[flag]
            : true;
          if (val) H.setAttribute('data-' + flag.replace(/_/g, '-'), '1');
        });
      } catch (_) {
        ['chat-v2','train-v2','nutrition-v2','profile-v2','progress-v2','auth-v2','public-v2','conversational-onboarding'].forEach(function (f) {
          H.setAttribute('data-' + f, '1');
        });
      }
      // Auth pre-paint gate for /app/**. Without this, an unauthenticated
      // visitor clicking "Chat" sees the full chat UI flash for ~300 ms
      // (React mounts before the async requireAuth() -> config fetch chain
      // finishes). Probe for any sb-*-auth-token key in localStorage; if
      // absent, redirect to /auth/login/ synchronously with a next= param.
      // A stale token still hits the async redirect from requireAuth()
      // later — but the cold-visitor path no longer flashes.
      try {
        if (location.pathname.indexOf('/app/') === 0) {
          var hasSession = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('sb-') === 0 && k.indexOf('auth-token') >= 0) {
              hasSession = true; break;
            }
          }
          if (!hasSession) {
            var returnTo = location.pathname + location.search;
            location.replace('/auth/login/?next=' + encodeURIComponent(returnTo));
          }
        }
      } catch (_) { /* localStorage disabled; async requireAuth will handle */ }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css?v=redesign-1">
  <link rel="stylesheet" href="/shared/chrome.css?v=redesign-1">
  <script type="module">
    import { bootTheme } from '/shared/theme.js?v=redesign-1';
    import { resolveFlag } from '/shared/feature-flags.js?v=redesign-9';
    bootTheme();
    if (resolveFlag('progress_v2')) {
      window.location.replace('/app/progress/?drill=session' + window.location.search.replace(/^\?/, '&'));
    }
  </script>
  <style>
    /* Session detail — drill-down view. All tokens from shared/site.css. */

    body.session-detail-page {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
    }

    .session-detail-shell {
      max-width: 520px;
      margin: 0 auto;
      padding: 32px 24px 80px;
      box-sizing: border-box;
    }

    .progress-loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Back link */
    .back {
      font-size: 0.78rem;
      color: var(--accent);
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 16px;
      display: inline-block;
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }

    /* Page title */
    .page-title {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .page-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Type dot */
    .type-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Mini stat row */
    .stat-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .mini-stat {
      flex: 1;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
    }
    .mini-stat-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .mini-stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    /* Section label */
    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* Exercise block (resistance/bodyweight) */
    .exercise-block {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .exercise-block:last-child { margin-bottom: 0; }
    .exercise-block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .exercise-block-name {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--ink);
    }
    .exercise-block-vol {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* Set rows within exercise block */
    .set-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 0.76rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .set-row:last-child { border-bottom: none; }
    .set-label { color: var(--muted); font-weight: 500; min-width: 36px; }
    .set-data { color: var(--ink); }
    .set-rpe { color: var(--muted); font-size: 0.68rem; }

    /* Cardio block */
    .cardio-block {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .cardio-stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .cardio-stat {
      text-align: center;
    }
    .cardio-stat-val {
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
    }
    .cardio-stat-label {
      font-size: 0.62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <!-- redirect-only body: stripped legacy markup to avoid flash -->
  <noscript>
    <p style="padding:20px;font-family:system-ui,sans-serif;">
      This page has moved. Please <a href="/">return home</a>.
    </p>
  </noscript>
</body>
</html>
