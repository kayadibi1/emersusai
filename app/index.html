<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
    <!-- no-cache-app: always revalidate app HTML -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0e1117">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Emersus | Emersus AI</title>  <!-- no-flash-boot: resolves data-theme pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        // Default to Graphite·Jade (mint, dark) for new visitors. Existing
        // users keep whatever they've saved. System prefers-color-scheme is
        // ignored by design; users switch in Settings.
        var theme = (saved === 'mint' || saved === 'paper') ? saved : 'mint';
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      // Auth pre-paint gate for /app/**. Without this, an unauthenticated
      // visitor clicking "Chat" sees the full chat UI flash for ~300 ms
      // (React mounts before the async requireAuth() -> config fetch chain
      // finishes). Probe for any sb-*-auth-token key in localStorage; if
      // absent, redirect to /auth/login/ synchronously with a next= param.
      // A stale token still hits the async redirect from requireAuth()
      // later — but the cold-visitor path no longer flashes.
      try {
        if (location.pathname.indexOf('/app/') === 0) {
          var hasSession = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('sb-') === 0 && k.indexOf('auth-token') >= 0) {
              hasSession = true; break;
            }
          }
          if (!hasSession) {
            var returnTo = location.pathname + location.search;
            location.replace('/auth/login/?next=' + encodeURIComponent(returnTo));
          }
        }
      } catch (_) { /* localStorage disabled; async requireAuth will handle */ }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css">
  <link rel="stylesheet" href="/shared/chrome.css">
  <link rel="stylesheet" href="/shared/skeleton.css">
  <link rel="stylesheet" href="/shared/lighting-fx.css">
  <!-- chat.css ships unconditionally — every rule is scoped under
       the data-chat-v2 attribute, so it's a no-op until the boot script below sets
       the attribute. -->
  <link rel="stylesheet" href="/shared/chat.css">
  <script type="module">
    import { bootTheme } from '/shared/theme.js';
    import { initLightingFx } from '/shared/lighting-fx.js';
    bootTheme();
    // data-theme are already resolved by the synchronous
    // pre-paint script above. Module boot only re-syncs the theme in case
    // the user flipped it between the pre-paint run and this tick.
    // Atmospheric lighting — MutationObserver inside picks up the
    // React-rendered chat cards (source rows, rail cards).
    initLightingFx({ selectors: '.source-row, .rail-card' });
  </script>
</head>
<body class="chat-page app-body">
  <!-- /app is the chat. Per the 2026-04-15 redesign spec ("Chat (/app, default
       home)"). The chat React app mounts on #chat-root via react-chat-app.js. -->
  <div id="chat-root"></div>

  <script type="module" src="/shared/react-chat-app.js?v=2026-04-15-chat-memory"></script>
</body>
</html>
