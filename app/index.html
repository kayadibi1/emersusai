<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
    <!-- no-cache-app: always revalidate app HTML -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emersus | Emersus AI</title>  <!-- no-flash-boot: resolves data-theme + v2 flags pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        var theme = (saved === 'mint' || saved === 'paper') ? saved
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'paper' : 'mint');
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      try {
        var url = new URLSearchParams(location.search);
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('emersus-flags') || '{}') || {}; } catch (_) {}
        var FLAGS = ['chat_v2','train_v2','nutrition_v2','profile_v2','progress_v2','auth_v2','public_v2','conversational_onboarding'];
        FLAGS.forEach(function (flag) {
          var raw = url.get(flag);
          var val = (raw === '0' || raw === 'false') ? false
            : (raw === '1' || raw === 'true') ? true
            : (typeof stored[flag] === 'boolean') ? stored[flag]
            : true;
          if (val) H.setAttribute('data-' + flag.replace(/_/g, '-'), '1');
        });
      } catch (_) {
        ['chat-v2','train-v2','nutrition-v2','profile-v2','progress-v2','auth-v2','public-v2','conversational-onboarding'].forEach(function (f) {
          H.setAttribute('data-' + f, '1');
        });
      }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css?v=redesign-1">
  <link rel="stylesheet" href="/shared/chrome.css?v=redesign-1">
  <!-- chat-v2.css ships unconditionally — every rule is scoped under
       [data-chat-v2="1"], so it's a no-op until the boot script below sets
       the attribute. -->
  <link rel="stylesheet" href="/shared/chat-v2.css?v=redesign-5">
  <script type="module">
    import { bootTheme } from '/shared/theme.js?v=redesign-1';
    bootTheme();
    // data-chat-v2 and data-theme are already resolved by the synchronous
    // pre-paint script above. Module boot only re-syncs the theme in case
    // the user flipped it between the pre-paint run and this tick.
  </script>
</head>
<body class="chat-page">
  <!-- /app is the chat. Per the 2026-04-15 redesign spec ("Chat (/app, default
       home)"). The chat React app mounts on #chat-root via react-chat-app.js. -->
  <div id="chat-root"></div>

  <script type="module" src="/shared/react-chat-app.js?v=2026-04-15-chat-memory"></script>
</body>
</html>
