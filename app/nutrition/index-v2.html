<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nutrition | Emersus AI</title>
    <!-- no-flash-boot: resolves data-theme + v2 flags pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        var theme = (saved === 'mint' || saved === 'paper') ? saved
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'paper' : 'mint');
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      try {
        var url = new URLSearchParams(location.search);
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('emersus-flags') || '{}') || {}; } catch (_) {}
        var FLAGS = ['chat_v2','train_v2','nutrition_v2','profile_v2','progress_v2','auth_v2','public_v2','conversational_onboarding'];
        FLAGS.forEach(function (flag) {
          var raw = url.get(flag);
          var val = (raw === '0' || raw === 'false') ? false
            : (raw === '1' || raw === 'true') ? true
            : (typeof stored[flag] === 'boolean') ? stored[flag]
            : true;
          if (val) H.setAttribute('data-' + flag.replace(/_/g, '-'), '1');
        });
      } catch (_) {
        ['chat-v2','train-v2','nutrition-v2','profile-v2','progress-v2','auth-v2','public-v2','conversational-onboarding'].forEach(function (f) {
          H.setAttribute('data-' + f, '1');
        });
      }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css?v=redesign-1">
  <link rel="stylesheet" href="/shared/chrome.css?v=redesign-1">
  <link rel="stylesheet" href="/shared/nutrition-v2.css?v=redesign-9">
  <script type="module">
    import { bootTheme } from '/shared/theme.js?v=redesign-1';
    bootTheme();
    document.documentElement.dataset.nutritionV2 = '1';
  </script>
</head>
<body class="nutrition-v2-body">
    <!-- app-crossnav: fixed top bar linking app sections -->
  <aside class="app-crossnav" aria-label="App sections">
    <a href="/app/" data-section="chat">Chat</a>
    <a href="/app/train/" data-section="train">Train</a>
    <a href="/app/nutrition/" data-section="nutrition">Nutrition</a>
    <a href="/app/progress/" data-section="progress">Progress</a>
    <a href="/app/profile/" data-section="profile">Profile</a>
    <script>
      (function () {
        var p = location.pathname;
        var key = /^\/app\/train/.test(p) ? 'train'
          : /^\/app\/nutrition/.test(p) ? 'nutrition'
          : /^\/app\/progress/.test(p) ? 'progress'
          : /^\/app\/profile/.test(p) ? 'profile'
          : 'chat';
        var host = document.currentScript.parentElement;
        var el = host.querySelector('[data-section="' + key + '"]');
        if (el) el.classList.add('is-active');
      })();
    </script>
  </aside>
<div id="nutrition-v2-root"></div>
  <script type="module" src="/app/nutrition/nutrition-v2.js?v=redesign-9"></script>
</body>
</html>
