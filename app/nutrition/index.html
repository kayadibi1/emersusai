<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nutrition · Emersus</title>
    <!-- no-flash-boot: resolves data-theme + v2 flags pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        var theme = (saved === 'mint' || saved === 'paper') ? saved
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'paper' : 'mint');
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      try {
        var url = new URLSearchParams(location.search);
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('emersus-flags') || '{}') || {}; } catch (_) {}
        var FLAGS = ['chat_v2','train_v2','nutrition_v2','profile_v2','progress_v2','auth_v2','public_v2','conversational_onboarding'];
        FLAGS.forEach(function (flag) {
          var raw = url.get(flag);
          var val = (raw === '0' || raw === 'false') ? false
            : (raw === '1' || raw === 'true') ? true
            : (typeof stored[flag] === 'boolean') ? stored[flag]
            : true;
          if (val) H.setAttribute('data-' + flag.replace(/_/g, '-'), '1');
        });
      } catch (_) {
        ['chat-v2','train-v2','nutrition-v2','profile-v2','progress-v2','auth-v2','public-v2','conversational-onboarding'].forEach(function (f) {
          H.setAttribute('data-' + f, '1');
        });
      }
    })();
  </script>
<link rel="icon" type="image/png" href="/emersus-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css?v=redesign-1">
  <link rel="stylesheet" href="/shared/chrome.css?v=redesign-1">
  <script type="module">
    import { bootTheme } from '/shared/theme.js?v=redesign-1';
    import { resolveFlag } from '/shared/feature-flags.js?v=redesign-9';
    bootTheme();
    if (resolveFlag('nutrition_v2')) {
      window.location.replace('/app/nutrition/index-v2.html' + window.location.search);
    }
  </script>
  <link rel="stylesheet" href="/shared/site.css?v=redesign-20260412" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container site-header-inner">
        <a class="brand-mark" href="/"><img src="/emersus-logo.png" alt="Emersus"></a>
        <nav class="site-nav">
          <a href="/app/">Dashboard</a>
          <a href="/chat/">Chat</a>
          <a href="/app/workout/">Workout</a>
          <a href="/app/nutrition/" aria-current="page">Nutrition</a>
          <a href="/app/progress/">Progress</a>
          <button class="button button-ghost" type="button" data-auth-logout>Log Out</button>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="container" id="root">Loading...</div>
    </main>

    <footer class="site-footer">
      <div class="container site-footer-inner">
        <span class="footer-copy" style="font-family:'JetBrains Mono',monospace;font-weight:300;">Emersus</span>
        <nav class="footer-links">
          <a href="/privacy/">Privacy</a>
          <a href="/terms/">Terms</a>
          <a href="/contact/">Contact</a>
        </nav>
      </div>
    </footer>
  </div>

  <script type="module">
    import { getSupabase, requireAuth } from "/shared/supabase.js";

    const session = await requireAuth();
    if (!session) throw new Error("redirect in progress");

    const sb = await getSupabase();
    window.EMERSUS_SUPABASE = sb;
    window.EMERSUS_AUTH = session.access_token;

    await import("./nutrition.js");

    // Bind the shared Log Out button (same pattern as app-pages.js)
    const logoutBtn = document.querySelector("[data-auth-logout]");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", async () => {
        logoutBtn.disabled = true;
        logoutBtn.textContent = "Logging Out...";
        await sb.auth.signOut();
        window.location.href = "/auth/login/";
      });
    }
  </script>
</body>
</html>
