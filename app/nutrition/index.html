<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nutrition · Emersus</title>
  <link rel="icon" type="image/svg+xml" href="/emersus_mark_fibonacci_blue.svg" />
  <link rel="stylesheet" href="/shared/site.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root">Loading…</div>
  <script type="module">
    // Use the standard shared/supabase.js auth — same pattern as all other
    // /app/ pages. requireAuth() reads the Supabase client's internal session
    // (not a custom localStorage key) and redirects to /auth/login if absent.
    import { getSupabase, requireAuth } from "/shared/supabase.js";

    const session = await requireAuth();
    if (!session) throw new Error("redirect in progress");

    // Populate the window globals the nutrition panel modules expect.
    const sb = await getSupabase();
    window.EMERSUS_SUPABASE = sb;
    window.EMERSUS_AUTH = session.access_token;

    // Load the app AFTER auth is resolved so panels see the globals.
    await import("./nutrition.js");
  </script>
</body>
</html>
