<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
    <!-- no-cache-app: always revalidate app HTML -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0e1117">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Nutrition | Emersus AI</title>
  <!-- no-flash-boot: resolves data-theme pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        // Default to Graphite·Jade (mint, dark) for new visitors. Existing
        // users keep whatever they've saved. System prefers-color-scheme is
        // ignored by design; users switch in Settings.
        var theme = (saved === 'mint' || saved === 'paper') ? saved : 'mint';
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      // Auth pre-paint gate for /app/**. Without this, an unauthenticated
      // visitor clicking "Chat" sees the full chat UI flash for ~300 ms
      // (React mounts before the async requireAuth() -> config fetch chain
      // finishes). Probe for any sb-*-auth-token key in localStorage; if
      // absent, redirect to /auth/login/ synchronously with a next= param.
      // A stale token still hits the async redirect from requireAuth()
      // later — but the cold-visitor path no longer flashes.
      try {
        if (location.pathname.indexOf('/app/') === 0) {
          var hasSession = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('sb-') === 0 && k.indexOf('auth-token') >= 0) {
              hasSession = true; break;
            }
          }
          if (!hasSession) {
            var returnTo = location.pathname + location.search;
            location.replace('/auth/login/?next=' + encodeURIComponent(returnTo));
          }
        }
      } catch (_) { /* localStorage disabled; async requireAuth will handle */ }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css">
  <link rel="stylesheet" href="/shared/chrome.css">
  <link rel="stylesheet" href="/shared/skeleton.css">
  <link rel="stylesheet" href="/shared/lighting-fx.css">
  <link rel="stylesheet" href="/shared/nutrition.css">
  <style>
    /* PDF export — scope @media print to just the active meal plan.
     * exportMealPlanAsPdf in shared/nutrition-plan-panel.js toggles
     * body.is-printing-nutrition-plan before window.print(). Clean
     * chrome, keep only .plan-panel content for the print dialog. */
    @media print {
      body.is-printing-nutrition-plan .app-sidebar,
      body.is-printing-nutrition-plan .nu-tabs,
      body.is-printing-nutrition-plan .nu-top,
      body.is-printing-nutrition-plan .plan-actions,
      body.is-printing-nutrition-plan .day-type-tabs,
      body.is-printing-nutrition-plan .nu-meals-cta,
      body.is-printing-nutrition-plan .button-pro-gated {
        display: none !important;
      }
      body.is-printing-nutrition-plan {
        background: white !important;
      }
      body.is-printing-nutrition-plan .plan-panel,
      body.is-printing-nutrition-plan .plan-panel * {
        color: #111 !important;
      }
      body.is-printing-nutrition-plan .plan-panel {
        width: 100%;
        max-width: 100%;
        padding: 0;
      }
      body.is-printing-nutrition-plan .plan-panel .meal-group,
      body.is-printing-nutrition-plan .plan-panel .plan-supplements {
        page-break-inside: avoid;
      }
      @page { margin: 0.5in; }
    }
    /* Matches /app/workout/ — dashed border styling for Free-gated link. */
    .button-pro-gated {
      display: inline-block;
      padding: 10px 14px;
      border: 1px dashed var(--accent-line);
      border-radius: 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: border-color .14s, background .14s;
    }
    .button-pro-gated:hover {
      border-style: solid;
      background: var(--accent-soft);
    }
  </style>
  <script type="module">
    import { bootTheme } from '/shared/theme.js';
    import { initLightingFx } from '/shared/lighting-fx.js';
    bootTheme();
    document.documentElement.dataset.nutritionV2 = '1';
    initLightingFx({ selectors: '.nu-history-row, .nu-soon-card' });
  </script>
</head>
<body class="nutrition-body app-body">
  <!-- app-sidebar: left nav bar linking app sections -->
  <aside class="app-sidebar" aria-label="App navigation">
    <div class="app-sidebar-head">
      <a class="app-sidebar-brand" href="/">em<b>∴</b>rsus</a>
    </div>
    <nav class="app-sidebar-sections">
      <div class="app-sidebar-sections-label">Sections</div>
      <a class="app-sidebar-section" data-section="chat" href="/app/"><span class="app-sidebar-section-dot"></span>Chat</a>
      <a class="app-sidebar-section" data-section="train" href="/app/train/"><span class="app-sidebar-section-dot"></span>Train</a>
      <a class="app-sidebar-section" data-section="nutrition" href="/app/nutrition/"><span class="app-sidebar-section-dot"></span>Nutrition</a>
      <a class="app-sidebar-section" data-section="progress" href="/app/progress/"><span class="app-sidebar-section-dot"></span>Progress</a>
      <a class="app-sidebar-section" data-section="library" href="/app/library/"><span class="app-sidebar-section-dot"></span>Library</a>
      <a class="app-sidebar-section" data-section="profile" href="/app/profile/"><span class="app-sidebar-section-dot"></span>Profile</a>
    </nav>
    <script>
      (function () {
        var p = location.pathname;
        var key = /^\/app\/train/.test(p) ? 'train'
          : /^\/app\/nutrition/.test(p) ? 'nutrition'
          : /^\/app\/progress/.test(p) ? 'progress'
          : /^\/app\/library/.test(p) ? 'library'
          : /^\/app\/profile/.test(p) ? 'profile'
          : 'chat';
        var host = document.currentScript.parentElement;
        var el = host.querySelector('[data-section="' + key + '"]');
        if (el) el.classList.add('is-active');
      })();
    </script>
  </aside>
<div id="nutrition-v2-root"></div>
  <script type="module" src="/app/nutrition/nutrition.js"></script>
</body>
</html>
