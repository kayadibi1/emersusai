<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
    <!-- no-cache-legacy: defeat browser cache on redirect page -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Alerts | Emersus Admin</title>
  <!-- no-flash-boot: resolves data-theme + v2 flags pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        // Default to Paper·Royal (light) for new visitors. Existing users keep
        // whatever they've saved. System prefers-color-scheme is ignored by
        // design — the product ships light-first; users switch in Settings.
        var theme = (saved === 'mint' || saved === 'paper') ? saved : 'paper';
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'paper'); }
      try {
        var url = new URLSearchParams(location.search);
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('emersus-flags') || '{}') || {}; } catch (_) {}
        var FLAGS = ['chat_v2','train_v2','nutrition_v2','profile_v2','progress_v2','auth_v2','public_v2','conversational_onboarding'];
        FLAGS.forEach(function (flag) {
          var raw = url.get(flag);
          var val = (raw === '0' || raw === 'false') ? false
            : (raw === '1' || raw === 'true') ? true
            : (typeof stored[flag] === 'boolean') ? stored[flag]
            : true;
          if (val) H.setAttribute('data-' + flag.replace(/_/g, '-'), '1');
        });
      } catch (_) {
        ['chat-v2','train-v2','nutrition-v2','profile-v2','progress-v2','auth-v2','public-v2','conversational-onboarding'].forEach(function (f) {
          H.setAttribute('data-' + f, '1');
        });
      }
      // Auth pre-paint gate for /app/**. Without this, an unauthenticated
      // visitor clicking "Chat" sees the full chat UI flash for ~300 ms
      // (React mounts before the async requireAuth() -> config fetch chain
      // finishes). Probe for any sb-*-auth-token key in localStorage; if
      // absent, redirect to /auth/login/ synchronously with a next= param.
      // A stale token still hits the async redirect from requireAuth()
      // later — but the cold-visitor path no longer flashes.
      try {
        if (location.pathname.indexOf('/app/') === 0) {
          var hasSession = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('sb-') === 0 && k.indexOf('auth-token') >= 0) {
              hasSession = true; break;
            }
          }
          if (!hasSession) {
            var returnTo = location.pathname + location.search;
            location.replace('/auth/login/?next=' + encodeURIComponent(returnTo));
          }
        }
      } catch (_) { /* localStorage disabled; async requireAuth will handle */ }
    })();
  </script>
<link rel="stylesheet" href="/shared/admin.css">
</head>
<body data-admin>
  <div class="admin-shell">
    <nav class="admin-nav">
      <a class="admin-nav-brand" href="/admin/">Emersus Admin</a>
      <div class="admin-nav-links">
        <a href="/admin/">Dashboard</a>
        <a href="/admin/candidates/">Candidates</a>
        <a href="/admin/topics/">Topics</a>
        <a href="/admin/feeds/">Feeds</a>
        <a href="/admin/jobs/">Jobs</a>
        <a href="/admin/alerts/" aria-current="page">Alerts</a>
      </div>
      <span class="admin-nav-end" id="nav-user"></span>
    </nav>
    <main class="admin-main">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
        <h1 class="admin-page-title" style="margin:0">Alert Log</h1>
        <select id="days-filter" class="admin-input" style="width:auto;">
          <option value="7">Last 7 days</option>
          <option value="30" selected>Last 30 days</option>
          <option value="90">Last 90 days</option>
          <option value="365">Last year</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="refresh-btn">Refresh</button>
      </div>
      <div id="alerts-wrap"><div class="admin-loading">Loading…</div></div>
    </main>
  </div>

  <script type="module">
    import { requireAdmin } from "/shared/supabase.js";

    const session = await requireAdmin({ redirectTo: "/auth/login/", nonAdminRedirect: "/auth/login/" });
    if (!session) throw new Error("no session");

    document.getElementById("nav-user").textContent = session.user.email;
    const token = session.access_token;

    async function apiFetch(path) {
      const r = await fetch(path, { headers: { Authorization: `Bearer ${token}` } });
      if (r.status === 401 || r.status === 403) {
        window.location.replace(`/auth/login/?next=${encodeURIComponent(window.location.pathname)}`);
        return null;
      }
      return r;
    }

    function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function shortDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("en-US", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
    }

    let currentDays = 30;

    async function load() {
      const wrap = document.getElementById("alerts-wrap");
      wrap.innerHTML = '<div class="admin-loading">Loading…</div>';
      const r = await apiFetch(`/api/admin/alerts?days=${currentDays}&limit=1000`);
      if (!r) return;
      if (!r.ok) { wrap.innerHTML = `<div class="admin-empty">Error: ${await r.text()}</div>`; return; }
      const { alerts } = await r.json();
      if (!alerts.length) {
        wrap.innerHTML = `<div class="admin-empty">No alerts in the last ${currentDays} days.</div>`;
        return;
      }
      wrap.innerHTML = `
        <p style="font-size:0.82rem;color:var(--muted);margin-bottom:0.75rem;">${alerts.length} alert${alerts.length !== 1 ? "s" : ""}</p>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Sent At</th><th>Type</th><th>Subject</th><th>Recipient</th><th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${alerts.map(a => `
                <tr>
                  <td style="white-space:nowrap;">${shortDate(a.sent_at)}</td>
                  <td style="font-family:monospace;font-size:0.8rem;">${esc(a.alert_type ?? a.type ?? "—")}</td>
                  <td style="max-width:360px;word-break:break-word;">${esc(a.subject ?? a.summary ?? "—")}</td>
                  <td>${esc(a.recipient ?? a.email ?? "—")}</td>
                  <td>${esc(a.status ?? "sent")}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>`;
    }

    document.getElementById("days-filter").addEventListener("change", e => {
      currentDays = Number(e.target.value);
      load();
    });
    document.getElementById("refresh-btn").addEventListener("click", load);
    load();
  </script>
</body>
</html>
