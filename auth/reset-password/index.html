<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
    <!-- no-cache-app: always revalidate app HTML -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | Emersus AI</title>
    <!-- no-flash-boot: resolves data-theme + v2 flags pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        var theme = (saved === 'mint' || saved === 'paper') ? saved
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'paper' : 'mint');
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      try {
        var url = new URLSearchParams(location.search);
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('emersus-flags') || '{}') || {}; } catch (_) {}
        var FLAGS = ['chat_v2','train_v2','nutrition_v2','profile_v2','progress_v2','auth_v2','public_v2','conversational_onboarding'];
        FLAGS.forEach(function (flag) {
          var raw = url.get(flag);
          var val = (raw === '0' || raw === 'false') ? false
            : (raw === '1' || raw === 'true') ? true
            : (typeof stored[flag] === 'boolean') ? stored[flag]
            : true;
          if (val) H.setAttribute('data-' + flag.replace(/_/g, '-'), '1');
        });
      } catch (_) {
        ['chat-v2','train-v2','nutrition-v2','profile-v2','progress-v2','auth-v2','public-v2','conversational-onboarding'].forEach(function (f) {
          H.setAttribute('data-' + f, '1');
        });
      }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css?v=redesign-1">
  <script type="module">
    import { bootTheme } from '/shared/theme.js?v=redesign-1';
    bootTheme();
    // Reset-password flow stays on the legacy page even with auth_v2 — the
    // password-reset form is bound to a one-time token URL that Supabase emits;
    // duplicating it under the v2 shell would require a 5th panel + token plumbing.
    // Tracked as a Phase 7 follow-up.
  </script>
  <link rel="stylesheet" href="/shared/site.css?v=redesign-20260412">
</head>
<body data-page="reset-password">
  <div class="site-shell">
    <header class="site-header">
      <div class="container site-header-inner">
        <a class="brand-mark" href="/"><img src="/emersus-logo.png" alt="Emersus"></a>
        <nav class="site-nav">
          <a href="/privacy/">Privacy</a>
          <a href="/terms/">Terms</a>
          <a href="/contact/">Contact</a>
          <a href="/auth/login/">Log In</a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="container auth-layout">
        <section class="hero-panel auth-copy stack">
          <p class="section-kicker">New Password</p>
          <h1>Set your new password.</h1>
          <p class="lede">
            This page only works after you follow a valid recovery link from your inbox.
          </p>
        </section>

        <section class="form-panel stack">
          <div>
            <p class="section-kicker">Reset Password</p>
            <h2>Choose a new password</h2>
          </div>
          <form class="form-grid" data-auth-reset>
            <label class="field">
              <span class="field-label">New Password</span>
              <input type="password" name="password" autocomplete="new-password" minlength="8" required>
            </label>
            <label class="field">
              <span class="field-label">Confirm Password</span>
              <input type="password" name="confirm_password" autocomplete="new-password" minlength="8" required>
            </label>
            <div class="button-row">
              <button class="button button-primary" type="submit">Update Password</button>
            </div>
            <p class="status-text" data-auth-status></p>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="/shared/auth-pages.js"></script>
</body>
</html>
