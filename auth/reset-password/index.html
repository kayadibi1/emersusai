<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
    <!-- no-cache-app: always revalidate app HTML -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0e1117">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Reset Password | Emersus AI</title>
  <!-- no-flash-boot: resolves data-theme pre-paint. Duplicated across every
       auth page by design: the sync read must happen BEFORE the first paint,
       so it cannot be moved into an external module (which is deferred). -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        var theme = (saved === 'mint' || saved === 'paper') ? saved : 'mint';
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      try {
        if (location.pathname.indexOf('/app/') === 0) {
          var hasSession = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('sb-') === 0 && k.indexOf('auth-token') >= 0) {
              hasSession = true; break;
            }
          }
          if (!hasSession) {
            var returnTo = location.pathname + location.search;
            location.replace('/auth/login/?next=' + encodeURIComponent(returnTo));
          }
        }
      } catch (_) { /* localStorage disabled; async requireAuth will handle */ }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css">
  <link rel="stylesheet" href="/shared/chrome.css">
  <link rel="stylesheet" href="/shared/auth.css">
  <script type="module">
    import { bootTheme } from '/shared/theme.js';
    bootTheme();
  </script>
</head>
<body class="auth-body" data-page="reset-password">
  <main class="auth-stage" style="min-height:100vh;">
    <div class="auth-stage-inner">
      <section class="auth-panel">
        <header class="auth-panel-head">
          <h2>Set a new password</h2>
          <p>Use at least 8 characters.</p>
        </header>

        <form class="auth-form" data-auth-reset novalidate>
          <label class="auth-field">
            <span>New password</span>
            <input type="password" name="password" autocomplete="new-password" required minlength="8" />
          </label>
          <label class="auth-field">
            <span>Confirm new password</span>
            <input type="password" name="confirm_password" autocomplete="new-password" required minlength="8" />
          </label>
          <button class="auth-primary" type="submit">Update password</button>
          <p class="auth-status" data-auth-status role="status" aria-live="polite" aria-atomic="true" tabindex="-1"></p>
        </form>

        <div class="auth-panel-foot">
          <p><a href="/auth/?panel=login">← Back to log in</a></p>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="/shared/auth-pages.js"></script>
</body>
</html>
