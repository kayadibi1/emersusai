<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log In | Emersus AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/site.css">
</head>
<body data-page="login">
  <div class="site-shell">
    <header class="site-header">
      <div class="container site-header-inner">
        <a class="brand-mark" href="/">Emersus AI</a>
        <nav class="site-nav">
          <a href="/privacy/">Privacy</a>
          <a href="/terms/">Terms</a>
          <a href="/contact/">Contact</a>
          <a href="/auth/signup/">Sign Up</a>
        </nav>
      </div>
    </header>

    <main class="page-main auth-main">
      <section class="auth-card stack">
        <header class="auth-card-head stack">
          <h1 class="auth-card-title">Welcome back</h1>
          <p class="auth-card-sub">Log in to continue to Emersus.</p>
        </header>

        <div class="oauth-stack">
          <button class="button button-oauth" type="button" data-auth-oauth="google">
            <svg class="oauth-icon" viewBox="0 0 18 18" aria-hidden="true" focusable="false">
              <path fill="#EA4335" d="M9 3.48c1.69 0 2.85.73 3.5 1.34l2.54-2.48C13.46 1 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z"/>
              <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.17-1.84H9v3.49h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.71-1.58 2.68-3.91 2.68-6.63z"/>
              <path fill="#FBBC05" d="M3.88 10.78A5.4 5.4 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z"/>
              <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.87.86-3.04.86-2.38 0-4.4-1.57-5.13-3.74L.96 13.04A9 9 0 0 0 9 18z"/>
              <path fill="none" d="M0 0h18v18H0z"/>
            </svg>
            <span>Continue with Google</span>
          </button>
          <p class="status-text" data-auth-oauth-status></p>
        </div>

        <div class="oauth-divider"><span>or continue with email</span></div>

        <form class="form-grid" data-auth-login>
          <label class="field">
            <span class="field-label">Email</span>
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label class="field">
            <span class="field-label-row">
              <span class="field-label">Password</span>
              <a class="field-aside-link" href="/auth/forgot-password/">Forgot?</a>
            </span>
            <input type="password" name="password" autocomplete="current-password" required>
          </label>
          <button class="button button-primary button-block" type="submit">Log In</button>
          <p class="status-text" data-auth-status></p>
          <button class="link-button" type="button" data-auth-resend hidden>Resend confirmation email</button>
        </form>

        <p class="auth-card-foot">
          New here? <a class="auth-switch" href="/auth/signup/">Create an account</a>.
        </p>
      </section>
    </main>
  </div>

  <script type="module" src="/shared/auth-pages.js"></script>
</body>
</html>
