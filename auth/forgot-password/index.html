<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
    <!-- no-cache-legacy: defeat browser cache on redirect page -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password | Emersus AI</title>
    <!-- no-flash-boot: resolves data-theme + v2 flags pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        var theme = (saved === 'mint' || saved === 'paper') ? saved
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'paper' : 'mint');
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      try {
        var url = new URLSearchParams(location.search);
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('emersus-flags') || '{}') || {}; } catch (_) {}
        var FLAGS = ['chat_v2','train_v2','nutrition_v2','profile_v2','progress_v2','auth_v2','public_v2','conversational_onboarding'];
        FLAGS.forEach(function (flag) {
          var raw = url.get(flag);
          var val = (raw === '0' || raw === 'false') ? false
            : (raw === '1' || raw === 'true') ? true
            : (typeof stored[flag] === 'boolean') ? stored[flag]
            : true;
          if (val) H.setAttribute('data-' + flag.replace(/_/g, '-'), '1');
        });
      } catch (_) {
        ['chat-v2','train-v2','nutrition-v2','profile-v2','progress-v2','auth-v2','public-v2','conversational-onboarding'].forEach(function (f) {
          H.setAttribute('data-' + f, '1');
        });
      }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css?v=redesign-1">
  <script type="module">
    import { bootTheme } from '/shared/theme.js?v=redesign-1';
    import { resolveFlag } from '/shared/feature-flags.js?v=redesign-7';
    bootTheme();
    if (resolveFlag('auth_v2')) {
      window.location.replace('/auth/?panel=forgot' + window.location.search.replace(/^\?/, '&'));
    }
  </script>
  <link rel="stylesheet" href="/shared/site.css?v=redesign-20260412">
</head>
<body data-page="forgot-password">
  <div class="site-shell">
    <header class="site-header">
      <div class="container site-header-inner">
        <a class="brand-mark" href="/"><img src="/emersus-logo.png" alt="Emersus"></a>
        <nav class="site-nav">
          <a href="/privacy/">Privacy</a>
          <a href="/terms/">Terms</a>
          <a href="/contact/">Contact</a>
          <a href="/auth/login/">Log In</a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="container auth-layout">
        <section class="hero-panel auth-copy stack">
          <p class="section-kicker">Account Recovery</p>
          <h1>Reset your password securely.</h1>
          <p class="lede">
            We will send a password reset link to your email. Use the link from that message to set a new password.
          </p>
        </section>

        <section class="form-panel stack">
          <div>
            <p class="section-kicker">Forgot Password</p>
            <h2>Send reset link</h2>
          </div>
          <form class="form-grid" data-auth-forgot>
            <label class="field">
              <span class="field-label">Email</span>
              <input type="email" name="email" autocomplete="email" required>
            </label>
            <div class="button-row">
              <button class="button button-primary" type="submit">Send Reset Link</button>
            </div>
            <p class="status-text" data-auth-status></p>
          </form>
          <p class="helper-text">
            Back to <a class="auth-switch" href="/auth/login/">log in</a>.
          </p>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="/shared/auth-pages.js"></script>
</body>
</html>
