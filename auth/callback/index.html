<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signing in | Emersus AI</title>
    <!-- no-flash-boot: resolves data-theme + v2 flags pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        var theme = (saved === 'mint' || saved === 'paper') ? saved
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'paper' : 'mint');
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      try {
        var url = new URLSearchParams(location.search);
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('emersus-flags') || '{}') || {}; } catch (_) {}
        var FLAGS = ['chat_v2','train_v2','nutrition_v2','profile_v2','progress_v2','auth_v2','public_v2','conversational_onboarding'];
        FLAGS.forEach(function (flag) {
          var raw = url.get(flag);
          var val = (raw === '0' || raw === 'false') ? false
            : (raw === '1' || raw === 'true') ? true
            : (typeof stored[flag] === 'boolean') ? stored[flag]
            : true;
          if (val) H.setAttribute('data-' + flag.replace(/_/g, '-'), '1');
        });
      } catch (_) {
        ['chat-v2','train-v2','nutrition-v2','profile-v2','progress-v2','auth-v2','public-v2','conversational-onboarding'].forEach(function (f) {
          H.setAttribute('data-' + f, '1');
        });
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css?v=redesign-1">
  <link rel="stylesheet" href="/shared/chrome.css?v=redesign-1">
  <link rel="stylesheet" href="/shared/auth-v2.css?v=redesign-7">
  <style>
    [data-auth-v2="1"] .callback-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    [data-auth-v2="1"] .callback-card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    [data-auth-v2="1"] .callback-kicker {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0;
    }
    [data-auth-v2="1"] .callback-title {
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--ink);
      margin: 0;
    }
    [data-auth-v2="1"] .callback-status {
      font-size: 15px;
      line-height: 1.55;
      color: var(--muted);
      margin: 4px 0 0;
    }
  </style>
</head>
<body class="auth-v2-body">
  <main class="callback-wrap">
    <section class="callback-card" data-auth-callback>
      <p class="callback-kicker">Authenticating</p>
      <h1 class="callback-title">Finishing sign-in</h1>
      <p class="callback-status" data-auth-status>Working on it…</p>
    </section>
  </main>

  <script type="module" src="/shared/auth-pages.js"></script>
</body>
</html>
