<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
    <!-- no-cache-app: always revalidate app HTML -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0e1117">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Signing in | Emersus AI</title>
  <!-- no-flash-boot: resolves data-theme pre-paint -->
  <script>
    (function () {
      var H = document.documentElement;
      try {
        var saved = localStorage.getItem('emersus-theme');
        // Default to Graphite·Jade (mint, dark) for new visitors. Existing
        // users keep whatever they've saved. System prefers-color-scheme is
        // ignored by design; users switch in Settings.
        var theme = (saved === 'mint' || saved === 'paper') ? saved : 'mint';
        H.setAttribute('data-theme', theme);
      } catch (_) { H.setAttribute('data-theme', 'mint'); }
      // Auth pre-paint gate for /app/**. Without this, an unauthenticated
      // visitor clicking "Chat" sees the full chat UI flash for ~300 ms
      // (React mounts before the async requireAuth() -> config fetch chain
      // finishes). Probe for any sb-*-auth-token key in localStorage; if
      // absent, redirect to /auth/login/ synchronously with a next= param.
      // A stale token still hits the async redirect from requireAuth()
      // later — but the cold-visitor path no longer flashes.
      try {
        if (location.pathname.indexOf('/app/') === 0) {
          var hasSession = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('sb-') === 0 && k.indexOf('auth-token') >= 0) {
              hasSession = true; break;
            }
          }
          if (!hasSession) {
            var returnTo = location.pathname + location.search;
            location.replace('/auth/login/?next=' + encodeURIComponent(returnTo));
          }
        }
      } catch (_) { /* localStorage disabled; async requireAuth will handle */ }
    })();
  </script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-tokens.css">
  <link rel="stylesheet" href="/shared/chrome.css">
  <link rel="stylesheet" href="/shared/auth.css">
  <style>
    .callback-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .callback-card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .callback-kicker {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0;
    }
    .callback-title {
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--ink);
      margin: 0;
    }
    .callback-status {
      font-size: 15px;
      line-height: 1.55;
      color: var(--muted);
      margin: 4px 0 0;
    }
    .callback-spinner {
      width: 32px;
      height: 32px;
      margin: 12px auto 0;
      border-radius: 50%;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      animation: callback-spin 0.9s linear infinite;
    }
    @keyframes callback-spin {
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .callback-spinner { animation: none; border-top-color: var(--accent); }
    }
  </style>
</head>
<body class="auth-body">
  <main class="callback-wrap">
    <section class="callback-card" data-auth-callback>
      <p class="callback-kicker">Authenticating</p>
      <h1 class="callback-title">One moment…</h1>
      <p class="callback-status" data-auth-status role="status" aria-live="polite" aria-atomic="true" tabindex="-1">Working on it…</p>
      <div class="callback-spinner" aria-hidden="true"></div>
    </section>
  </main>

  <script type="module" src="/shared/auth-pages.js"></script>
</body>
</html>
